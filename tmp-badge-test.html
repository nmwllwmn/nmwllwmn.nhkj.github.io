<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林舟的临时工牌</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #eef4ff 0%, #dfe9fb 100%);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #122033;
        }
        .badge {
            width: min(360px, calc(100vw - 32px));
            border-radius: 24px;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 24px 70px rgba(16, 38, 72, 0.18);
            border: 1px solid rgba(19, 36, 66, 0.08);
        }
        .head {
            padding: 20px 22px 16px;
            background: linear-gradient(135deg, #132747, #274a7c);
            color: #f8fbff;
        }
        .head strong {
            display: block;
            font-size: 20px;
            font-weight: 800;
        }
        .head span {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            opacity: 0.82;
            letter-spacing: 0.08em;
        }
        .body {
            padding: 20px 22px 24px;
        }
        .flag {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 12px;
            border-radius: 999px;
            background: rgba(39, 84, 148, 0.10);
            color: #20426d;
            font-size: 12px;
            font-weight: 700;
        }
        .grid {
            display: grid;
            gap: 14px;
            margin-top: 18px;
        }
        .item small {
            display: block;
            color: #6e7d94;
            font-size: 12px;
            margin-bottom: 6px;
        }
        .item strong {
            display: block;
            font-size: 18px;
            font-weight: 800;
        }
        .foot {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px dashed rgba(18, 32, 51, 0.12);
            color: #66778f;
            font-size: 13px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <section class="badge"
        data-name="林舟"
        data-employee-id="TMP-0617"
        data-type="TMP"
        data-credential-type="临时工牌">
        <div class="head">
            <strong>南洄市临时人员通行凭证</strong>
            <span>TMP TEMPORARY ACCESS PASS</span>
        </div>
        <div class="body">
            <div class="flag">识别属性: TMP</div>
            <div class="grid">
                <div class="item">
                    <small>员工姓名</small>
                    <strong>林舟</strong>
                </div>
                <div class="item">
                    <small>员工工号</small>
                    <strong>TMP-0617</strong>
                </div>
                <div class="item">
                    <small>凭证类型</small>
                    <strong>临时工牌</strong>
                </div>
            </div>
            <div class="foot">
                临时员工<br>
                编号记录: TMP-0617<br>
                当前工牌仅用于临时区域通行与到访登记。
            </div>
        </div>
    </section>
</body>
</html>
