<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钉钉 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 400px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #0089ff, #00c6ff);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0089ff, #00c6ff);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            font-weight: bold;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0, 137, 255, 0.3);
        }

        .logo h1 {
            font-size: 24px;
            color: #1a1a1a;
            font-weight: 600;
        }

        .logo p {
            font-size: 14px;
            color: #999;
            margin-top: 4px;
        }

        .login-tabs {
            display: flex;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 24px;
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            position: relative;
            transition: all 0.3s;
        }

        .login-tab.active {
            color: #0089ff;
            font-weight: 500;
        }

        .login-tab.active::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: #0089ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #0089ff;
            box-shadow: 0 0 0 3px rgba(0, 137, 255, 0.1);
        }

        .form-input::placeholder {
            color: #bfbfbf;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 12px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0089ff, #00c6ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 137, 255, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: #0089ff;
        }

        .forgot-password {
            color: #0089ff;
            text-decoration: none;
            cursor: pointer;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #999;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .divider span {
            padding: 0 16px;
        }

        .qr-login {
            text-align: center;
        }

        .qr-code {
            width: 160px;
            height: 160px;
            background: #f5f5f5;
            border-radius: 8px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: #999;
        }

        .qr-hint {
            font-size: 13px;
            color: #666;
        }

        .qr-hint a {
            color: #0089ff;
            text-decoration: none;
        }

        .hidden-clue {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            cursor: help;
            transition: color 0.3s;
        }

        .hidden-clue:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* 解谜提示 */
        .puzzle-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: #ff4d4f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .login-container:hover .puzzle-hint {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="puzzle-hint" title="检查页面源代码">?</div>
        
        <div class="logo">
            <div class="logo-icon">钉</div>
            <h1>钉钉</h1>
            <p>数字化办公平台</p>
        </div>

        <div class="login-tabs">
            <div class="login-tab active" data-tab="password">密码登录</div>
            <div class="login-tab" data-tab="sms">短信登录</div>
            <div class="login-tab" data-tab="qr">扫码登录</div>
        </div>

        <div class="error-message" id="errorMsg">
            账号或密码错误，请重试
        </div>

        <!-- 密码登录 -->
        <div class="login-form" id="passwordForm">
            <div class="form-group">
                <label class="form-label">手机号/邮箱</label>
                <input type="text" class="form-input" placeholder="请输入手机号或邮箱" id="username" value="138****8888">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" placeholder="请输入密码" id="password" value="">
                    <span class="toggle-password">显示</span>
                </div>
            </div>
            <button class="login-btn" id="loginBtn">登 录</button>
            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" checked>
                    <span>记住密码</span>
                </label>
                <a class="forgot-password">忘记密码？</a>
            </div>
        </div>

        <!-- 短信登录 -->
        <div class="login-form hidden" id="smsForm" style="display: none;">
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="text" class="form-input" placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <label class="form-label">验证码</label>
                <div style="display: flex; gap: 12px;">
                    <input type="text" class="form-input" placeholder="请输入验证码" style="flex: 1;">
                    <button style="padding: 12px 20px; background: #f5f5f5; border: 1px solid #d9d9d9; border-radius: 8px; cursor: pointer; white-space: nowrap;">获取验证码</button>
                </div>
            </div>
            <button class="login-btn">登 录</button>
        </div>

        <!-- 扫码登录 -->
        <div class="login-form hidden" id="qrForm" style="display: none;">
            <div class="qr-login">
                <div class="qr-code">▣</div>
                <p class="qr-hint">请使用钉钉手机版扫一扫登录<br>或 <a href="#">下载钉钉客户端</a></p>
            </div>
        </div>

        <div class="divider">
            <span>其他登录方式</span>
        </div>

        <div style="text-align: center; color: #999; font-size: 13px;">
            支付宝 · 淘宝 · 微博 · 微信
        </div>
    </div>

    <div class="hidden-clue" title="提示：默认密码与日期有关">?</div>

    <!-- 隐藏的解谜线索 -->
    <!-- 
        线索1: 员工编号 E-2024-0615
        线索2: 默认密码是今天的日期 20240615
        线索3: 登录后查看消息列表第一条
    -->

    <script>
        // 标签切换
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.login-form').forEach(form => form.style.display = 'none');
                document.getElementById(tabName + 'Form').style.display = 'block';
            });
        });

        // 显示/隐藏密码
        document.querySelector('.toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = '隐藏';
            } else {
                passwordInput.type = 'password';
                this.textContent = '显示';
            }
        });

        // 登录验证
        document.getElementById('loginBtn').addEventListener('click', () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // 解谜答案：密码是今天的日期 20240615
            if (password === '20240615') {
                // 登录成功
                localStorage.setItem('dingtalk_logged_in', 'true');
                localStorage.setItem('dingtalk_user', username);
                window.location.href = 'workbench.html';
            } else {
                errorMsg.textContent = '密码错误！提示：今天的日期（8位数字）';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
            }
        });

        // 忘记密码提示
        document.querySelector('.forgot-password').addEventListener('click', () => {
            alert('密码提示：今天的日期，格式 YYYYMMDD');
        });

        // 检查是否已登录
        if (localStorage.getItem('dingtalk_logged_in')) {
            window.location.href = 'workbench.html';
        }
    </script>
</body>
</html>
