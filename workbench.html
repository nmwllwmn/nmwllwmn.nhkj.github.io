<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - 钉钉</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .app-container {
            display: flex;
            height: 100vh;
        }
        /* 左侧导航栏 - 浅蓝色背景 */
        .sidebar {
            width: 72px;
            background: #e8f4ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            flex-shrink: 0;
        }
        .org-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4a90e2, #7bb3f0);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .org-name {
            font-size: 12px;
            color: #333;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            padding: 0 8px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.6);
            color: #333;
        }
        .nav-item.disabled {
            cursor: default;
            opacity: 0.45;
        }
        .nav-item.disabled:hover {
            background: transparent;
            color: #666;
        }
        .nav-item.active {
            background: white;
            color: #333;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .nav-icon {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }
        .nav-badge {
            margin-left: auto;
            min-width: 18px;
            height: 18px;
            background: #ff4d4f;
            color: white;
            font-size: 11px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .nav-dot {
            margin-left: auto;
            width: 8px;
            height: 8px;
            background: #ff4d4f;
            border-radius: 50%;
        }
        .sidebar-bottom {
            margin-top: auto;
            width: 100%;
            padding: 0 8px;
        }
        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* 顶部栏 */
        .header {
            height: 48px;
            background: white;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .org-selector {
            font-size: 14px;
            color: #262626;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            width: 200px;
            height: 32px;
            padding: 0 12px 0 32px;
            border: 1px solid #d9d9d9;
            border-radius: 16px;
            font-size: 13px;
            background: #f5f5f5;
            transition: all 0.3s;
        }
        .search-box input:focus {
            outline: none;
            background: white;
            border-color: #1890ff;
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }
        .header-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 18px;
            position: relative;
        }
        .header-icon:hover {
            background: #f5f5f5;
        }
        .header-icon .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background: #ff4d4f;
            border-radius: 50%;
        }
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        /* 内容滚动区 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        /* 公告横幅 */
        .banner {
            background: linear-gradient(135deg, #4a90e2 0%, #7bb3f0 100%);
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        .banner-content h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .banner-content p {
            font-size: 13px;
            opacity: 0.9;
        }
        .banner-icon {
            font-size: 48px;
            opacity: 0.3;
        }
        /* 公告区 */
        .notice-section {
            background: white;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .notice-icon {
            width: 32px;
            height: 32px;
            background: #fff7e6;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .notice-content {
            flex: 1;
        }
        .notice-title {
            font-size: 14px;
            color: #262626;
            font-weight: 500;
        }
        .notice-desc {
            font-size: 12px;
            color: #8c8c8c;
            margin-top: 2px;
        }
        .notice-arrow {
            color: #bfbfbf;
            font-size: 14px;
        }
        /* 常用应用 */
        .section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 16px;
            color: #262626;
            font-weight: 500;
        }
        .section-more {
            font-size: 13px;
            color: #8c8c8c;
            cursor: pointer;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .app-item:hover {
            background: #f5f5f5;
        }
        .app-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.3s;
        }
        .app-item:hover .app-icon-wrapper {
            transform: scale(1.1);
        }
        .app-icon-wrapper.blue { background: #e6f7ff; }
        .app-icon-wrapper.green { background: #f6ffed; }
        .app-icon-wrapper.orange { background: #fff7e6; }
        .app-icon-wrapper.red { background: #fff1f0; }
        .app-icon-wrapper.purple { background: #f9f0ff; }
        .app-icon-wrapper.cyan { background: #e6fffb; }
        .app-name {
            font-size: 13px;
            color: #595959;
        }
        /* 应用分类 */
        .app-tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 12px;
        }
        .app-tab {
            font-size: 14px;
            color: #595959;
            cursor: pointer;
            padding: 4px 0;
            position: relative;
        }
        .app-tab.active {
            color: #1890ff;
            font-weight: 500;
        }
        .app-tab.active::after {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 0;
            right: 0;
            height: 2px;
            background: #1890ff;
        }
        /* 推荐应用 */
        .recommend-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .recommend-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .recommend-item:hover {
            background: #f5f5f5;
        }
        .recommend-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 20px;
        }
        .recommend-info {
            flex: 1;
        }
        .recommend-name {
            font-size: 14px;
            color: #262626;
            font-weight: 500;
        }
        .recommend-desc {
            font-size: 12px;
            color: #8c8c8c;
            margin-top: 2px;
        }
        .recommend-btn {
            padding: 6px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: white;
            color: #595959;
            font-size: 13px;
            cursor: pointer;
        }
        .recommend-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }
        /* 解谜提示 */
        .puzzle-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a1a;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .puzzle-toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .hidden-data { display: none; }
    </style>
</head>
<body>

                <!-- 公告区 -->

                    <div class="app-grid">

                        <div class="app-item">
                            <div class="app-icon-wrapper orange">📋</div>

                        <div class="app-item">
                            <div class="app-icon-wrapper green">📝</div>

                        <div class="app-item">

                        <div class="app-item">

                        <div class="app-item">

                </div>

                <!-- 全部应用 -->
                <div class="section">
                    <div class="app-tabs">

        </main>
    </div>
</body>
