<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南洄凭证复核登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #130b0d;
            --panel: rgba(30, 17, 21, 0.94);
            --panel-soft: rgba(255, 255, 255, 0.045);
            --line: rgba(255, 107, 122, 0.22);
            --line-hot: rgba(255, 107, 122, 0.62);
            --text: #f7eaec;
            --muted: #b9959c;
            --dim: #855d66;
            --accent: #ff5266;
            --good: #8ee6c5;
            --bad: #ff7b8b;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at 20% 18%, rgba(255, 82, 102, 0.18), transparent 30%),
                radial-gradient(circle at 82% 78%, rgba(86, 8, 20, 0.38), transparent 36%),
                linear-gradient(135deg, #080506 0%, #1d0d12 48%, #090607 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.16;
            background: linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 100% 3px;
            mix-blend-mode: screen;
        }

        body.is-transitioning .panel {
            transform: scale(0.94);
            opacity: 0;
            filter: blur(12px);
            transition: transform 900ms ease, opacity 900ms ease, filter 900ms ease;
        }

        .particle-stage {
            position: fixed;
            inset: 0;
            z-index: 30;
            pointer-events: none;
            opacity: 0;
            transition: opacity 220ms ease;
        }

        .particle-stage.is-active {
            opacity: 1;
        }

        .particle-stage.is-ready {
            pointer-events: auto;
        }

        .particle-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .particle-enter {
            position: absolute;
            left: 50%;
            top: calc(50% + 118px);
            min-width: 170px;
            min-height: 44px;
            border: 1px solid rgba(255, 180, 188, 0.45);
            border-radius: 999px;
            background: rgba(30, 8, 12, 0.72);
            color: rgba(255, 236, 239, 0.94);
            font: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            opacity: 0;
            transform: translate(-50%, 12px);
            box-shadow: 0 0 26px rgba(255, 82, 102, 0.18);
            transition: opacity 520ms ease, transform 520ms ease, border-color 180ms ease, background 180ms ease;
        }

        .particle-stage.is-ready .particle-enter {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .particle-enter:hover {
            border-color: rgba(255, 220, 224, 0.72);
            background: rgba(74, 18, 28, 0.86);
        }

        .login-shell {
            position: relative;
            width: min(420px, 100%);
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 30px 90px rgba(0,0,0,0.42);
            overflow: hidden;
        }

        .terminal {
            min-height: 84px;
            padding: 12px;
            margin-top: 16px;
            border: 1px solid rgba(255, 107, 122, 0.16);
            border-radius: 6px;
            background: rgba(0,0,0,0.18);
            color: #e5cdd2;
            font-family: Consolas, "SFMono-Regular", monospace;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .terminal .ok { color: var(--good); }
        .terminal .bad { color: var(--bad); }
        .terminal .warn { color: #ffd18a; }

        .card {
            padding: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
        }

        .mark {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #450710, #bd2338);
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            box-shadow: 0 0 22px rgba(255, 46, 70, 0.2);
        }

        .brand strong { display: block; font-size: 17px; }
        .brand span { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }

        .form { display: block; }

        label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 7px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 42px;
            border: 1px solid var(--line);
            border-radius: 6px;
            outline: none;
            background: rgba(0,0,0,0.24);
            color: var(--text);
            padding: 0 12px;
            font: inherit;
            margin-bottom: 14px;
        }

        input:focus {
            border-color: var(--line-hot);
            box-shadow: 0 0 0 3px rgba(255, 82, 102, 0.12);
        }

        .btn {
            width: 100%;
            min-height: 44px;
            border: 0;
            border-radius: 6px;
            background: linear-gradient(135deg, #9f1d31, #ff5266);
            color: #fff;
            font: inherit;
            font-weight: 650;
            cursor: pointer;
        }

        .drop-zone {
            min-height: 190px;
            border: 1px dashed var(--line-hot);
            border-radius: 8px;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 18px;
            background: var(--panel-soft);
            cursor: pointer;
            margin-bottom: 14px;
        }

        .drop-zone.is-over {
            border-style: solid;
            background: rgba(255, 82, 102, 0.12);
        }

        .drop-icon {
            width: 62px;
            height: 82px;
            border: 1px solid rgba(255, 107, 122, 0.42);
            border-radius: 8px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, rgba(125, 18, 34, 0.8), rgba(12, 5, 8, 0.96));
        }

        .drop-title { display: block; font-weight: 700; margin-bottom: 6px; }
        .drop-copy { display: block; color: var(--muted); font-size: 12px; line-height: 1.65; }

        input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .hint {
            margin-top: 14px;
            color: var(--dim);
            font-size: 12px;
            line-height: 1.7;
        }

        .tmp-reveal {
            display: none;
            margin-top: 16px;
            padding: 16px;
            border: 1px solid rgba(142, 230, 197, 0.28);
            border-left: 3px solid var(--good);
            border-radius: 7px;
            background:
                linear-gradient(135deg, rgba(142, 230, 197, 0.08), rgba(255,255,255,0.025)),
                rgba(0,0,0,0.18);
            color: #eafff7;
        }

        .tmp-reveal.is-visible {
            display: block;
        }

        .tmp-kicker {
            color: var(--good);
            font-family: Consolas, "SFMono-Regular", monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .tmp-title {
            font-size: 18px;
            font-weight: 750;
            margin-bottom: 8px;
        }

        .tmp-copy {
            color: #c9eee2;
            font-size: 13px;
            line-height: 1.8;
        }

        .tmp-meta {
            margin-top: 12px;
            display: grid;
            gap: 6px;
            color: #aee8d6;
            font-family: Consolas, "SFMono-Regular", monospace;
            font-size: 12px;
        }

        @media (max-width: 760px) {
            .login-shell { width: min(420px, 100%); }
        }
    </style>
</head>
<body>
    <div class="particle-stage" id="particleStage" aria-hidden="true">
        <canvas class="particle-canvas" id="particleCanvas"></canvas>
        <button class="particle-enter" type="button" id="particleEnter">进入系统</button>
    </div>

    <main class="login-shell">
        <section class="panel card">
            <div class="brand">
                <div class="mark">洄</div>
                <div>
                    <strong>南洄凭证复核登录</strong>
                    <span>离职账号 / 工牌回收池</span>
                </div>
            </div>

            <div class="form" id="badgeForm">
                <label class="drop-zone" id="dropZone" for="fileInput">
                    <span>
                        <span class="drop-icon"></span>
                        <span class="drop-title">刷入顾路工牌</span>
                        <span class="drop-copy">拖入顾路工牌 HTML，或同内容的 Base64 文本。</span>
                    </span>
                    <input id="fileInput" type="file" accept=".html,.htm,.txt,text/html,text/plain">
                </label>
                <button class="btn" type="button" id="sampleBtn">打开工牌样本</button>
                <p class="hint">凭证字段需包含：GL-0606、顾□□□、南洄科技有限公司、Recovered Staff Credential。</p>
            </div>

            <div class="terminal" id="terminal">[状态] 顾路账号已退出。
[入口] 等待工牌刷入</div>

            <div class="tmp-reveal" id="tmpReveal">
                <div class="tmp-kicker">TMP TEMPORARY ACCESS</div>
                <div class="tmp-title" id="tmpTitle">临时工牌结局：旁观者编号</div>
                <div class="tmp-copy" id="tmpCopy">
                    该凭证不属于顾路回收池。系统仍记录了这张临时工牌的入场痕迹。
                </div>
                <div class="tmp-meta">
                    <div id="tmpName">NAME: TMP</div>
                    <div id="tmpId">ID: TMP-UNKNOWN</div>
                    <div>POOL: TEMPORARY-CITY</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const terminal = document.getElementById('terminal');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const tmpReveal = document.getElementById('tmpReveal');
        const tmpTitle = document.getElementById('tmpTitle');
        const tmpCopy = document.getElementById('tmpCopy');
        const tmpName = document.getElementById('tmpName');
        const tmpId = document.getElementById('tmpId');
        const particleStage = document.getElementById('particleStage');
        const particleCanvas = document.getElementById('particleCanvas');
        const particleCtx = particleCanvas.getContext('2d');
        const particleEnter = document.getElementById('particleEnter');
        const requiredFields = [
            { label: 'ID', value: 'GL-0606' },
            { label: '姓名', value: '顾□□□' },
            { label: '公司', value: '南洄科技有限公司' },
            { label: '工牌类型', value: 'Recovered Staff Credential' }
        ];

        function log(lines) {
            terminal.innerHTML = lines.join('\n');
        }

        function normalizeBase64(rawText) {
            return rawText.trim().replace(/^data:[^,]+,/i, '').replace(/\s+/g, '');
        }

        function decodeBase64Utf8(rawText) {
            const normalized = normalizeBase64(rawText);
            if (!normalized || normalized.length % 4 === 1 || !/^[A-Za-z0-9+/]*={0,2}$/.test(normalized)) {
                throw new Error('Base64 mismatch');
            }
            const binary = atob(normalized);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8', { fatal: true }).decode(bytes);
        }

        function parseCredential(rawText) {
            const attempts = [{ mode: '明文 HTML', text: rawText.replace(/^\uFEFF/, '') }];
            try {
                attempts.push({ mode: 'Base64 UTF-8 解密', text: decodeBase64Utf8(rawText) });
            } catch (error) {
                attempts.push({ mode: 'Base64 解密失败', error });
            }

            for (const attempt of attempts) {
                if (!attempt.text) continue;
                const tmp = parseTmpCredential(attempt.text, attempt.mode);
                if (tmp.ok) return tmp;
                const missing = requiredFields.filter((field) => !attempt.text.includes(field.value));
                if (missing.length === 0) return { ok: true, mode: attempt.mode };
            }

            const text = attempts.find((attempt) => attempt.text)?.text || '';
            return {
                ok: false,
                mode: attempts[0].mode,
                missing: requiredFields.filter((field) => !text.includes(field.value)).map((field) => field.label)
            };
        }

        function stripTags(text) {
            return text
                .replace(/<script[\s\S]*?<\/script>/gi, ' ')
                .replace(/<style[\s\S]*?<\/style>/gi, ' ')
                .replace(/<[^>]+>/g, ' ')
                .replace(/&nbsp;/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function extractByPatterns(text, patterns) {
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match && match[1]) return match[1].trim();
            }
            return '';
        }

        function extractTmpName(text) {
            const plain = stripTags(text);
            const raw = `${text}\n${plain}`;
            return extractByPatterns(raw, [
                /(?:员工姓名|姓名|name|Name|NAME)\s*[:：=]\s*([\u4e00-\u9fa5A-Za-z0-9·]{2,24})/i,
                /data-(?:name|employee-name)\s*=\s*["']([^"']{2,32})["']/i,
                /<title>\s*([^<]{2,32}?)(?:的)?临时工牌/i,
                /([\u4e00-\u9fa5]{2,4})\s*(?:TMP|临时工牌|临时员工)/
            ]) || '临时访客';
        }

        function parseTmpCredential(text, mode) {
            const hasTmp = /\bTMP(?:[-_A-Z0-9]*)?\b|TMP-CITY|临时工牌|临时员工|临时凭证/i.test(text);
            if (!hasTmp) return { ok: false };

            const plain = stripTags(text);
            const raw = `${text}\n${plain}`;
            const id = extractByPatterns(raw, [
                /\b(TMP-[A-Z0-9-]{2,24})\b/i,
                /\b(TMP_CITY_[A-Z0-9_]{2,24})\b/i,
                /\b(TMP[A-Z0-9-]{3,24})\b/i
            ]) || 'TMP-UNKNOWN';

            return {
                ok: true,
                type: 'tmp',
                mode,
                id: id.toUpperCase().replace(/_/g, '-'),
                name: extractTmpName(text)
            };
        }

        function showTmpEnding(result) {
            localStorage.setItem('nh_tmp_easter_egg', 'true');
            localStorage.setItem('nh_tmp_name', result.name);
            localStorage.setItem('nh_tmp_id', result.id);
            tmpTitle.textContent = `临时工牌结局：${result.name}的旁观者编号`;
            tmpCopy.textContent = `该凭证不属于顾路回收池。${result.name}，系统没有给你正式账号，却保留了你的临时编号。旁观者，也会留下记录。`;
            tmpName.textContent = `NAME: ${result.name}`;
            tmpId.textContent = `ID: ${result.id}`;
            tmpReveal.classList.add('is-visible');
            log([
                '<span class="ok">[TMP] 临时凭证已识别。</span>',
                `[姓名] ${result.name}`,
                `[编号] ${result.id}`,
                '[结局] 旁观者编号已展开。'
            ]);
        }

        function resizeParticleCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            particleCanvas.width = Math.floor(window.innerWidth * dpr);
            particleCanvas.height = Math.floor(window.innerHeight * dpr);
            particleCanvas.style.width = `${window.innerWidth}px`;
            particleCanvas.style.height = `${window.innerHeight}px`;
            particleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function makeParticleTargets(count) {
            const temp = document.createElement('canvas');
            const ctx = temp.getContext('2d');
            const w = Math.min(window.innerWidth * 0.86, 720);
            const h = 240;
            temp.width = w;
            temp.height = h;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `800 ${Math.floor(Math.min(98, w / 6.8))}px Consolas, monospace`;
            ctx.fillText('GL-0606', w / 2, h / 2 - 38);
            ctx.font = `800 ${Math.floor(Math.min(44, w / 11.5))}px "Microsoft YaHei", "PingFang SC", sans-serif`;
            ctx.fillText('出入平安', w / 2, h / 2 + 52);

            const image = ctx.getImageData(0, 0, w, h).data;
            const points = [];
            for (let y = 0; y < h; y += 6) {
                for (let x = 0; x < w; x += 6) {
                    if (image[(y * w + x) * 4 + 3] > 80) {
                        points.push({
                            x: x + (window.innerWidth - w) / 2,
                            y: y + (window.innerHeight - h) / 2
                        });
                    }
                }
            }

            const targets = [];
            for (let i = 0; i < count; i += 1) {
                targets.push(points[Math.floor((i / count) * points.length)] || {
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2
                });
            }
            return targets;
        }

        function playBadgeParticleTransition() {
            resizeParticleCanvas();
            particleStage.classList.add('is-active');
            particleStage.classList.remove('is-ready');
            document.body.classList.add('is-transitioning');

            const count = window.innerWidth < 640 ? 360 : 760;
            const targets = makeParticleTargets(count);
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const particles = targets.map((target, index) => {
                const angle = (index / count) * Math.PI * 2;
                const ring = 82 + (index % 4) * 42 + Math.random() * 42;
                return {
                    x: cx + Math.cos(angle) * (24 + Math.random() * 28),
                    y: cy + Math.sin(angle) * (30 + Math.random() * 22),
                    angle,
                    spin: (Math.random() > 0.5 ? 1 : -1) * (0.8 + Math.random() * 1.4),
                    ring,
                    tx: target.x,
                    ty: target.y,
                    size: 1.2 + Math.random() * 2.2,
                    delay: Math.random() * 0.12,
                    wave: Math.random() * Math.PI * 2
                };
            });

            const start = performance.now();
            function frame(now) {
                const t = Math.min((now - start) / 5600, 1);
                particleCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                particleCtx.fillStyle = 'rgba(8, 5, 6, 0.2)';
                particleCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

                particles.forEach((p) => {
                    const local = Math.max(0, Math.min((t - p.delay) / (1 - p.delay), 1));
                    if (local < 0.28) {
                        const k = local / 0.28;
                        const scatter = 30 + k * p.ring;
                        p.x = cx + Math.cos(p.angle) * scatter;
                        p.y = cy + Math.sin(p.angle) * scatter;
                    } else if (local < 0.58) {
                        const k = (local - 0.28) / 0.30;
                        const a = p.angle + k * Math.PI * 2.2 * p.spin;
                        const breathe = p.ring + Math.sin(k * Math.PI * 5 + p.wave) * 28;
                        p.x = cx + Math.cos(a) * breathe;
                        p.y = cy + Math.sin(a) * (breathe * 0.58);
                    } else if (local < 0.78) {
                        const k = (local - 0.58) / 0.20;
                        const waveX = cx + (p.tx - cx) * k;
                        const waveY = cy + (p.ty - cy) * k + Math.sin(k * Math.PI * 4 + p.wave) * 54 * (1 - k);
                        p.x = waveX;
                        p.y = waveY;
                    } else {
                        const k = (local - 0.78) / 0.22;
                        const eased = 1 - Math.pow(1 - k, 3);
                        p.x = p.x + (p.tx - p.x) * (0.06 + eased * 0.18);
                        p.y = p.y + (p.ty - p.y) * (0.06 + eased * 0.18);
                    }
                    const alpha = Math.min(1, local * 2.6);
                    particleCtx.fillStyle = `rgba(255, ${120 + Math.floor(Math.random() * 35)}, ${135 + Math.floor(Math.random() * 30)}, ${alpha})`;
                    particleCtx.beginPath();
                    particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    particleCtx.fill();
                });

                if (t < 1) {
                    requestAnimationFrame(frame);
                } else {
                    particleStage.classList.add('is-ready');
                    log([
                        '<span class="ok">[完成] GL-0606 已重组。</span>',
                        '[入口] 等待进入系统。'
                    ]);
                }
            }
            requestAnimationFrame(frame);
        }

        async function inspectFile(file) {
            if (!file) return;
            log([
                '[读取] 正在校验工牌...',
                `[文件] ${file.name}`,
                `[大小] ${file.size} bytes`
            ]);

            try {
                const text = await file.text();
                const result = parseCredential(text);
                window.setTimeout(() => {
                    if (result.type === 'tmp') {
                        showTmpEnding(result);
                        return;
                    }
                    if (result.ok) {
                        localStorage.setItem('nh_workbench_mode', 'recovery');
                        localStorage.setItem('nh_gl_badge_verified', 'true');
                        log([
                            '<span class="ok">[通过] GL-0606 凭证已接入。</span>',
                            `[模式] ${result.mode}`,
                            '[重组] GL-0606 凭证粒子正在回收...'
                        ]);
                        window.setTimeout(playBadgeParticleTransition, 360);
                    } else {
                        log([
                            '<span class="bad">[拒绝] 凭证不属于当前回收池。</span>',
                            `[缺失] ${result.missing.join(', ') || '未知字段'}`,
                            '[状态] 工牌登录未完成。'
                        ]);
                    }
                }, 520);
            } catch (error) {
                log([
                    '<span class="bad">[错误] 文件读取失败。</span>',
                    String(error && error.message ? error.message : error)
                ]);
            }
        }

        ['dragenter', 'dragover'].forEach((type) => {
            dropZone.addEventListener(type, (event) => {
                event.preventDefault();
                dropZone.classList.add('is-over');
            });
        });

        ['dragleave', 'drop'].forEach((type) => {
            dropZone.addEventListener(type, (event) => {
                event.preventDefault();
                dropZone.classList.remove('is-over');
            });
        });

        dropZone.addEventListener('drop', (event) => {
            inspectFile(event.dataTransfer.files && event.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', () => {
            inspectFile(fileInput.files && fileInput.files[0]);
            fileInput.value = '';
        });

        document.getElementById('sampleBtn').addEventListener('click', () => {
            window.open('badge-template.html', '_blank', 'noopener,noreferrer');
        });

        particleEnter.addEventListener('click', () => {
            window.location.href = 'workbench.html?mode=recovery';
        });

        window.addEventListener('resize', () => {
            if (particleStage.classList.contains('is-active')) resizeParticleCanvas();
        });
    </script>
</body>
</html>
