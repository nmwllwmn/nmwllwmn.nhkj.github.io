<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档 - 钉钉</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f6f7;
            min-height: 100vh;
        }
        .app-container {
            display: flex;
            height: 100vh;
        }
        /* 左侧导航栏 */
        .sidebar {
            width: 64px;
            background: #001529;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            flex-shrink: 0;
        }
        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0089ff, #00c6ff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            position: relative;
        }
        .nav-item:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .nav-item.disabled {
            cursor: default;
            opacity: 0.45;
        }
        .nav-item.disabled:hover {
            color: rgba(255,255,255,0.65);
            background: transparent;
        }
        .nav-item.active {
            color: #0089ff;
            background: rgba(0,137,255,0.1);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: #0089ff;
            border-radius: 0 2px 2px 0;
        }
        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
        .nav-text {
            font-size: 11px;
        }
        .nav-badge {
            position: absolute;
            top: 6px;
            right: 8px;
            min-width: 16px;
            height: 16px;
            background: #ff4d4f;
            color: white;
            font-size: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .sidebar-bottom {
            margin-top: auto;
            width: 100%;
        }
        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* 顶部栏 */
        .header {
            height: 48px;
            background: white;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .doc-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .doc-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #1890ff, #36cfc9);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }
        .doc-title {
            font-size: 14px;
            color: #262626;
            font-weight: 500;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            width: 240px;
            height: 32px;
            padding: 0 12px 0 32px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            background: #f5f5f5;
            transition: all 0.3s;
        }
        .search-box input:focus {
            outline: none;
            background: white;
            border-color: #1890ff;
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }
        .header-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 18px;
            position: relative;
        }
        .header-icon:hover {
            background: #f5f5f5;
        }
        .header-icon .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background: #ff4d4f;
            border-radius: 50%;
        }
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        /* 内容区 */
        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        /* 左侧菜单 */
        .doc-sidebar {
            width: 200px;
            background: white;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            padding: 16px 0;
        }
        .new-doc-btn {
            margin: 0 16px 16px;
            padding: 10px 16px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .new-doc-btn:hover {
            background: #40a9ff;
        }
        .upload-btn {
            margin: 0 16px 16px;
            padding: 8px 16px;
            background: white;
            color: #595959;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .upload-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }
        .menu-section {
            margin-bottom: 8px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.3s;
            color: #595959;
            font-size: 14px;
        }
        .menu-item:hover {
            background: #f5f5f5;
        }
        .menu-item.active {
            background: #e6f7ff;
            color: #1890ff;
        }
        .menu-icon {
            font-size: 16px;
        }
        .menu-expand {
            margin-left: auto;
            font-size: 12px;
            transition: transform 0.3s;
        }
        .menu-expand.expanded {
            transform: rotate(90deg);
        }
        .submenu {
            padding-left: 42px;
        }
        .submenu-item {
            padding: 8px 16px;
            font-size: 13px;
            color: #8c8c8c;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submenu-item:hover {
            color: #1890ff;
        }
        /* 文档内容区 */
        .doc-content {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .doc-tabs {
            display: flex;
            gap: 32px;
            padding: 0 24px;
            border-bottom: 1px solid #f0f0f0;
            height: 48px;
            align-items: center;
        }
        .doc-tab {
            font-size: 14px;
            color: #595959;
            cursor: pointer;
            padding: 4px 0;
            position: relative;
        }
        .doc-tab.active {
            color: #262626;
            font-weight: 500;
        }
        .doc-tab.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            right: 0;
            height: 2px;
            background: #1890ff;
        }
        .doc-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        .toolbar-left {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .filter-dropdown {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            color: #595959;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .toolbar-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .view-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            color: #8c8c8c;
        }
        .view-btn:hover {
            background: #f5f5f5;
            color: #1890ff;
        }
        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #bfbfbf;
        }
        .empty-icon {
            width: 120px;
            height: 120px;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-text {
            font-size: 14px;
            color: #8c8c8c;
        }
        /* 解谜提示 */
        .puzzle-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a1a;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .puzzle-toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .hidden-data { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="logo">钉</div>
            <nav class="nav-menu">
                <a href="messages.html" class="nav-item">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">消息</span>
                    <span class="nav-badge">99+</span>
                </a>
                <a href="documents.html" class="nav-item active">
                    <span class="nav-icon">📄</span>
                    <span class="nav-text">文档</span>
                </a>
                <a href="#" class="nav-item disabled" aria-disabled="true">
                    <span class="nav-icon">🤖</span>
                    <span class="nav-text">AI</span>
                </a>
                <a href="workbench.html" class="nav-item">
                    <span class="nav-icon">📱</span>
                    <span class="nav-text">工作台</span>
                </a>
                <a href="contacts.html" class="nav-item">
                    <span class="nav-icon">👥</span>
                    <span class="nav-text">通讯录</span>
                </a>
                <a href="calendar.html" class="nav-item">
                    <span class="nav-icon">📅</span>
                    <span class="nav-text">日历</span>
                </a>
                <a href="#" class="nav-item disabled" aria-disabled="true">
                    <span class="nav-icon">✓</span>
                    <span class="nav-text">待办</span>
                    <span class="nav-badge">10</span>
                </a>
                <a href="#" class="nav-item disabled" aria-disabled="true">
                    <span class="nav-icon">⚡</span>
                    <span class="nav-text">DING</span>
                </a>
            </nav>
            <div class="sidebar-bottom">
                <a href="#" class="nav-item">
                    <span class="nav-icon">➕</span>
                    <span class="nav-text">添加</span>
                </a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="header">
                <div class="header-left">
                    <div class="doc-logo">
                        <div class="doc-icon">📄</div>
                        <span class="doc-title">钉钉文档</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <input type="text" placeholder="搜索">
                    </div>
                    <div class="header-icon">🔔<span class="badge"></span></div>
                    <div class="header-icon">📤</div>
                    <div class="header-icon">⋮</div>
                    <div class="user-avatar">张</div>
                </div>
            </header>

            <!-- 内容区 -->
            <div class="content">
                <!-- 左侧菜单 -->
                <aside class="doc-sidebar">
                    <button class="new-doc-btn" onclick="showPuzzle('新建文档需要权限验证')">
                        <span>+</span>
                        <span>新建</span>
                    </button>
                    <button class="upload-btn" onclick="showPuzzle('上传功能暂时关闭')">
                        <span>↑</span>
                        <span>上传</span>
                    </button>

                    <div class="menu-section">
                        <div class="menu-item active" onclick="showPuzzle('最近打开的文档')">
                            <span class="menu-icon">🕐</span>
                            <span>最近</span>
                        </div>
                        <div class="menu-item" onclick="showPuzzle('收藏的文档')">
                            <span class="menu-icon">⭐</span>
                            <span>收藏</span>
                        </div>
                        <div class="menu-item" onclick="showPuzzle('与我共享的文档')">
                            <span class="menu-icon">👥</span>
                            <span>与我共享</span>
                        </div>
                        <div class="menu-item" onclick="showPuzzle('我共享的文档')">
                            <span class="menu-icon">📤</span>
                            <span>我共享的</span>
                        </div>
                        <div class="menu-item" onclick="showPuzzle('未读文档')">
                            <span class="menu-icon">📋</span>
                            <span>未读文档</span>
                        </div>
                    </div>

                    <div class="menu-section">
                        <div class="menu-item" onclick="toggleMenu(this)">
                            <span class="menu-icon">📁</span>
                            <span>我的文档</span>
                            <span class="menu-expand">▶</span>
                        </div>
                        <div class="submenu" style="display: none;">
                            <div class="submenu-item" onclick="showPuzzle('个人工作文档')">工作文档</div>
                            <div class="submenu-item" onclick="showPuzzle('个人学习资料')">学习资料</div>
                        </div>
                    </div>

                    <div class="menu-section">
                        <div class="menu-item" onclick="toggleMenu(this)">
                            <span class="menu-icon">👥</span>
                            <span>团队文件</span>
                            <span class="menu-expand">▶</span>
                        </div>
                        <div class="submenu" style="display: none;">
                            <div class="submenu-item" onclick="showPuzzle('技术部共享文件夹')">技术部</div>
                            <div class="submenu-item" onclick="showPuzzle('Project X 机密文件夹 🔒')">Project X</div>
                        </div>
                    </div>

                    <div class="menu-section">
                        <div class="menu-item" onclick="toggleMenu(this)">
                            <span class="menu-icon">📚</span>
                            <span>知识库</span>
                            <span class="menu-expand">▶</span>
                        </div>
                    </div>
                </aside>

                <!-- 文档内容区 -->
                <div class="doc-content">
                    <div class="doc-tabs">
                        <div class="doc-tab active">最近</div>
                        <div class="doc-tab">收藏</div>
                        <div class="doc-tab">与我共享</div>
                        <div class="doc-tab">我共享的</div>
                        <div class="doc-tab">未读文档</div>
                    </div>

                    <div class="doc-toolbar">
                        <div class="toolbar-left">
                            <div class="filter-dropdown">
                                <span>所有类型</span>
                                <span>▼</span>
                            </div>
                        </div>
                        <div class="toolbar-right">
                            <span style="font-size: 13px; color: #8c8c8c;">创建人</span>
                            <span style="font-size: 13px; color: #8c8c8c;">最近打开 ▼</span>
                            <div class="view-btn">☰</div>
                            <div class="view-btn">▦</div>
                        </div>
                    </div>

                    <div class="doc-list">
                        <div class="empty-state">
                            <div class="empty-icon">📄</div>
                            <div class="empty-text">最近没有打开过文件</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="puzzle-toast" id="puzzleToast"></div>

    <div class="hidden-data">
        <!-- 线索：Project X 机密文件夹 -->
        <!-- 线索：团队文件中有隐藏文档 -->
    </div>

    <script>
        function showPuzzle(hint) {
            const toast = document.getElementById('puzzleToast');
            toast.textContent = '💡 ' + hint;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function toggleMenu(element) {
            const expand = element.querySelector('.menu-expand');
            const submenu = element.nextElementSibling;
            if (submenu && submenu.classList.contains('submenu')) {
                expand.classList.toggle('expanded');
                submenu.style.display = submenu.style.display === 'none' ? 'block' : 'none';
            }
        }

        // 标签切换
        document.querySelectorAll('.doc-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.doc-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
