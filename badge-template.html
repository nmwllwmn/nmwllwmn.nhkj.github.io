<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顾□□□ | 南洄科技有限公司工牌</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0612'/%3E%3Crect x='15' y='10' width='34' height='46' rx='5' fill='%23e0d4f5'/%3E%3Cpath d='M22 42h20' stroke='%23050310' stroke-width='8' stroke-linecap='round'/%3E%3Cpath d='M21 22h22' stroke='%236c3fa0' stroke-width='4'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0612;
    --surface: #16102a;
    --purple-deep: #1a0e35;
    --purple-mid: #6c3fa0;
    --purple-light: #a78bfa;
    --purple-glow: #c084fc;
    --purple-pale: #e0d4f5;
    --accent: #d4a8ff;
    --text-primary: #f0ecf7;
    --text-muted: #8a7fa0;
    --text-dim: #5c5478;
    --line: rgba(167,139,250,0.12);
    --ink-black: #050310;
    --ink-dark: #0a0520;
    --ink-deep: #060312;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    display: grid; place-items: center;
    background: var(--bg);
    font-family: 'Noto Sans SC', sans-serif;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 25% 30%, rgba(108,63,160,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 70%, rgba(60,20,120,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(20,10,40,0.8) 0%, transparent 80%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.025; pointer-events: none; z-index: 999;
  }

  .hint {
    position: fixed; left: 20px; top: 18px;
    color: rgba(167,139,250,0.45);
    font-size: 12px; letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    z-index: 10;
  }

  .stage {
    width: 100vw; height: 100vh;
    display: grid; place-items: center;
    perspective: 1200px; perspective-origin: 50% 50%;
    padding: 24px; z-index: 2; position: relative;
  }

  /* ===== LANYARD ===== */
  .lanyard {
    position: absolute;
    width: 52%; height: 110px;
    left: 24%; top: -94px;
    border: 12px solid rgba(108,63,160,0.7);
    border-bottom: 0;
    border-radius: 32px 32px 0 0;
    transform: translateZ(-16px);
    box-shadow: inset 0 0 0 1px rgba(192,132,252,0.12);
  }

  .clip {
    position: absolute;
    left: 50%; top: -18px;
    width: 70px; height: 38px;
    transform: translateX(-50%) translateZ(18px);
    border-radius: 8px;
    background: linear-gradient(180deg, #c4b5e0, #5c4580);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .clip::after {
    content: "";
    position: absolute;
    left: 16px; right: 16px; top: 10px;
    height: 9px; border-radius: 6px;
    background: rgba(10,6,18,0.45);
  }

  /* ===== BADGE WRAP ===== */
  .badge-wrap {
    position: relative;
    width: min(74vw, 390px);
    aspect-ratio: 0.64 / 1;
    transform-style: preserve-3d;
    cursor: grab;
    user-select: none; -webkit-user-select: none;
  }
  .badge-wrap:active { cursor: grabbing; }

  .badge, .badge-back {
    position: absolute; inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    overflow: hidden;
    box-shadow: 0 34px 90px rgba(0,0,0,0.58), 0 8px 24px rgba(108,63,160,0.12);
  }

  .badge {
    background: linear-gradient(165deg, #1e1440 0%, #130d2a 40%, #0e0920 100%);
    border: 1px solid rgba(167,139,250,0.12);
    color: var(--text-primary);
    transform: translateZ(10px);
  }

  .badge::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(125deg,
      transparent 0%, rgba(192,132,252,0.03) 25%,
      rgba(255,255,255,0.06) 30%, transparent 35%,
      rgba(192,132,252,0.04) 55%, rgba(255,255,255,0.05) 60%,
      transparent 65%);
    pointer-events: none; z-index: 20; mix-blend-mode: overlay;
  }

  .badge::after {
    content: "";
    position: absolute; left: 0; top: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--purple-mid), var(--purple-glow), var(--purple-mid));
    border-radius: 18px 18px 0 0;
  }

  .badge-back {
    background: linear-gradient(165deg, #1a1038 0%, #110c26 100%);
    border: 1px solid rgba(167,139,250,0.1);
    color: rgba(224,212,245,0.76);
    transform: rotateY(180deg) translateZ(10px);
    padding: 28px;
  }

  /* ===== COMPANY ===== */
  .company {
    padding: 30px 28px 0;
    display: flex; align-items: center;
    justify-content: space-between; gap: 14px;
    color: var(--purple-light);
    font-weight: 800; font-size: 15px;
    letter-spacing: 0.08em;
  }

  .logo {
    width: 42px; height: 42px;
    display: grid; place-items: center;
    border: 2px solid var(--purple-mid);
    border-radius: 8px;
    font-weight: 900; font-size: 14px;
    color: var(--purple-pale);
    background: linear-gradient(135deg, rgba(108,63,160,0.25), transparent);
    position: relative;
  }

  .logo::after {
    content: ''; position: absolute; inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.06) 100%);
  }

  /* ===== PHOTO ===== */
  .photo {
    width: calc(100% - 56px);
    aspect-ratio: 1.35 / 1;
    margin: 22px auto 18px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background:
      radial-gradient(circle at 52% 35%, rgba(192,132,252,0.15) 0 8%, transparent 9%),
      radial-gradient(circle at 50% 42%, #2a1f45 0 16%, transparent 17%),
      linear-gradient(180deg, #2a1f45, #180f35);
    position: relative; overflow: hidden;
    box-shadow: inset 0 0 30px rgba(108,63,160,0.08);
  }

  .photo::before {
    content: ""; position: absolute;
    left: 50%; bottom: -18%;
    width: 48%; height: 48%;
    transform: translateX(-50%);
    border-radius: 50% 50% 0 0;
    background: #1e1440;
  }

  .photo::after {
    content: "GL-0606"; position: absolute;
    right: 10px; bottom: 8px;
    color: rgba(167,139,250,0.4);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 1px;
  }

  /* ===== INFO ===== */
  .info {
    padding: 0 28px;
    display: grid; gap: 13px;
    position: relative; z-index: 2;
  }

  .name-row {
    display: flex; align-items: baseline;
    justify-content: space-between; gap: 18px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 11px;
  }

  .name-row strong {
    font-size: 34px; letter-spacing: 0.06em;
    color: var(--text-primary);
    position: relative;
  }

  .name-row .id-tag {
    color: var(--purple-glow);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; letter-spacing: 1px;
    flex-shrink: 0;
  }

  .row {
    display: grid;
    grid-template-columns: 82px 1fr;
    gap: 14px; align-items: center;
    min-height: 32px; font-size: 15px;
  }

  .row b {
    color: var(--text-dim);
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; font-weight: 500;
  }

  .row span { color: var(--purple-pale); letter-spacing: 0.5px; }

  /* ====================================================
     REALISTIC INK BLOT SYSTEM
     - SVG feTurbulence + feDisplacementMap for organic edges
     - Multiple layers: absorb → bleed → body → sheen → drops
  ===================================================== */

  .inked-name {
    position: relative;
    display: inline-block;
  }

  /* === Name ink zone (covers characters after 顾) === */
  .ink-zone {
    display: block;
    position: absolute;
    left: calc(100% - 6px);
    top: -10px;
    width: 185px;
    height: 52px;
    pointer-events: none;
    z-index: 10;
  }

  /* Paper absorption halo — widest, softest, no filter */
  .ink-zone .ink-absorb {
    position: absolute;
    inset: -10px -14px;
    background: radial-gradient(
      ellipse at 38% 46%,
      rgba(10, 5, 26, 0.28) 0%,
      rgba(8, 4, 20, 0.12) 40%,
      transparent 65%
    );
    border-radius: 50%;
    filter: blur(10px);
  }

  /* Edge bleed — distorted soft edge */
  .ink-zone .ink-bleed {
    position: absolute;
    inset: -3px -2px;
    background: radial-gradient(
      ellipse at 32% 44%,
      rgba(8, 4, 22, 0.6) 0%,
      rgba(6, 3, 18, 0.3) 40%,
      transparent 62%
    );
    border-radius: 44% 56% 50% 50% / 52% 42% 58% 48%;
    filter: url(#ink-soft);
  }

  /* Main ink body — fully opaque, heavy displacement */
  .ink-zone .ink-body {
    position: absolute;
    inset: 3px 1px;
    background: radial-gradient(
      ellipse at 26% 38%,
      #02010a 0%,
      #050312 25%,
      #0a0520 52%,
      #08041a 80%,
      #060314 100%
    );
    border-radius: 40% 60% 46% 54% / 56% 38% 62% 44%;
    filter: url(#ink-heavy);
    box-shadow:
      0 0 12px 4px rgba(8, 4, 22, 0.55),
      0 0 28px 10px rgba(8, 4, 22, 0.2),
      inset 0 0 15px 5px rgba(2, 1, 8, 0.4);
  }

  /* Wet sheen — subtle light catch */
  .ink-zone .ink-body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      140deg,
      transparent 25%,
      rgba(80, 50, 130, 0.045) 40%,
      rgba(120, 80, 180, 0.03) 48%,
      transparent 56%
    );
    border-radius: inherit;
    pointer-events: none;
  }

  /* Splatter drops */
  .ink-zone .ink-drop {
    position: absolute;
    border-radius: 52% 48% 55% 45% / 48% 55% 45% 52%;
    background: var(--ink-deep);
    filter: url(#ink-splat);
  }

  .ink-zone .d1 { width: 7px; height: 6px; left: -14px; top: 18px; opacity: 0.6; }
  .ink-zone .d2 { width: 5px; height: 5px; left: 16%; top: -9px; opacity: 0.5; }
  .ink-zone .d3 { width: 5px; height: 4px; right: -11px; bottom: 14px; opacity: 0.5; }
  .ink-zone .d4 { width: 3px; height: 3px; right: 26%; bottom: -8px; opacity: 0.4; }
  .ink-zone .d5 { width: 6px; height: 3px; left: 50%; top: -11px; opacity: 0.35; }
  .ink-zone .d6 { width: 3px; height: 4px; left: -8px; bottom: 4px; opacity: 0.35; }
  .ink-zone .d7 { width: 4px; height: 3px; right: 10%; top: 2px; opacity: 0.3; }

  /* Ink tendril / drip */
  .ink-zone .ink-drip {
    position: absolute;
    left: 42%; bottom: -12px;
    width: 7px; height: 16px;
    background: radial-gradient(
      ellipse at 50% 15%,
      var(--ink-deep) 0%,
      var(--ink-dark) 60%,
      transparent 100%
    );
    border-radius: 40% 60% 50% 50% / 25% 25% 75% 75%;
    filter: url(#ink-splat);
    opacity: 0.65;
  }


  /* === Position ink field === */
  .ink-field {
    position: relative;
    display: block;
    min-height: 30px;
    user-select: none; -webkit-user-select: none;
    color: transparent;
  }

  .ink-field .ink-absorb {
    position: absolute;
    inset: -8px -12px;
    background: radial-gradient(
      ellipse at 42% 50%,
      rgba(10, 5, 26, 0.22) 0%,
      transparent 55%
    );
    border-radius: 50%;
    filter: blur(8px);
  }

  .ink-field .ink-bleed {
    position: absolute;
    inset: -4px;
    left: -10px; right: 4%;
    background: radial-gradient(
      ellipse at 35% 46%,
      rgba(8, 4, 22, 0.55) 0%,
      rgba(6, 3, 18, 0.25) 38%,
      transparent 60%
    );
    border-radius: 46% 54% 50% 50% / 52% 44% 56% 48%;
    filter: url(#ink-soft);
  }

  .ink-field .ink-body {
    position: absolute;
    inset: -1px;
    left: -7px; right: 7%;
    background: radial-gradient(
      ellipse at 22% 40%,
      #02010a 0%,
      #050312 28%,
      #0a0520 55%,
      #08041a 85%,
      #050310 100%
    );
    border-radius: 48% 52% 46% 54% / 50% 42% 58% 50%;
    filter: url(#ink-heavy);
    box-shadow:
      0 0 10px 3px rgba(8, 4, 22, 0.5),
      0 0 22px 8px rgba(8, 4, 22, 0.18),
      inset 0 0 12px 4px rgba(2, 1, 8, 0.35);
  }

  .ink-field .ink-body::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      150deg,
      transparent 30%,
      rgba(80, 50, 130, 0.04) 44%,
      rgba(100, 70, 160, 0.025) 50%,
      transparent 58%
    );
    border-radius: inherit;
    pointer-events: none;
  }

  .ink-field .ink-drop {
    position: absolute;
    border-radius: 48% 52% 55% 45% / 52% 48% 52% 48%;
    background: var(--ink-deep);
    filter: url(#ink-splat);
  }

  .ink-field .d1 { width: 6px; height: 5px; left: -16px; top: 10px; opacity: 0.5; }
  .ink-field .d2 { width: 4px; height: 5px; right: -2px; top: -8px; opacity: 0.45; }
  .ink-field .d3 { width: 3px; height: 3px; left: 36%; bottom: -7px; opacity: 0.4; }
  .ink-field .d4 { width: 5px; height: 3px; left: -6px; top: -4px; opacity: 0.35; }


  /* ===== BARCODE ===== */
  .barcode {
    position: absolute;
    left: 28px; right: 28px; bottom: 14px;
    height: 24px;
    display: flex; align-items: stretch; gap: 2.5px;
    opacity: 0.35; z-index: 1;
  }

  .barcode i {
    display: block;
    width: var(--w);
    background: rgba(167,139,250,0.2);
    border-radius: 1px;
  }

  /* ===== BACK ===== */
  .back-title {
    color: var(--purple-glow);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.14em;
    margin-bottom: 20px; text-transform: uppercase;
  }

  .back-note {
    font-size: 14px; line-height: 1.9;
    color: rgba(224,212,245,0.65);
    margin-bottom: 14px;
  }

  .back-stamp {
    position: absolute;
    right: 24px; bottom: 22px;
    color: rgba(185,37,43,0.25);
    border: 2px solid rgba(185,37,43,0.2);
    padding: 8px 12px;
    transform: rotate(-11deg);
    font-weight: 900; letter-spacing: 0.16em;
    font-size: 16px;
    font-family: 'JetBrains Mono', monospace;
  }

  .shadow {
    position: absolute;
    width: 58%; height: 30px;
    left: 21%; bottom: 6%;
    border-radius: 50%;
    background: rgba(108,63,160,0.15);
    filter: blur(16px);
    transform: translateZ(-90px) rotateX(82deg);
    pointer-events: none;
  }

  /* ===== PARTICLES ===== */
  .particles {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1; overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--purple-glow);
    border-radius: 50%;
    opacity: 0;
    animation: pFloat linear infinite;
  }

  @keyframes pFloat {
    0%   { opacity: 0; transform: translateY(100vh) scale(0); }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
  }

  @media (max-width: 560px) {
    .badge-wrap { width: min(86vw, 360px); }
    .name-row strong { font-size: 28px; }
    .company, .info { padding-left: 22px; padding-right: 22px; }
    .barcode { left: 22px; right: 22px; }
    .ink-zone { width: 150px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .particle { animation: none; }
  }
</style>
</head>
<body>

<!-- ===== SVG INK FILTERS ===== -->
<svg style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
  <defs>
    <!-- Heavy displacement for main ink body -->
    <filter id="ink-heavy" x="-25%" y="-40%" width="150%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.075" numOctaves="5" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="15" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Soft displacement for bleed edges -->
    <filter id="ink-soft" x="-25%" y="-40%" width="150%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028 0.055" numOctaves="4" seed="8" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Minimal displacement for splatter drops -->
    <filter id="ink-splat" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<div class="hint">Drag badge · Double click to flip</div>
<div class="particles" id="particles"></div>

<main class="stage">
  <section class="badge-wrap" id="badge">
    <div class="lanyard" aria-hidden="true"></div>
    <div class="clip" aria-hidden="true"></div>

    <!-- ===== FRONT ===== -->
    <div class="badge">
      <header class="company">
        <div>南洄科技有限公司</div>
        <div class="logo" aria-hidden="true">NH</div>
      </header>

      <div class="photo" aria-hidden="true"></div>

      <div class="info">
        <div class="name-row">
          <strong>
            <span class="inked-name">顾
              <span class="ink-zone" aria-hidden="true">
                <span class="ink-absorb"></span>
                <span class="ink-bleed"></span>
                <span class="ink-body"></span>
                <span class="ink-drip"></span>
                <span class="ink-drop d1"></span>
                <span class="ink-drop d2"></span>
                <span class="ink-drop d3"></span>
                <span class="ink-drop d4"></span>
                <span class="ink-drop d5"></span>
                <span class="ink-drop d6"></span>
                <span class="ink-drop d7"></span>
              </span>
            </span>
          </strong>
          <span class="id-tag">ID: GL-0606</span>
        </div>

        <div class="row">
          <b>Company</b>
          <span>南洄科技有限公司</span>
        </div>
        <div class="row">
          <b>Since</b>
          <span>2026年 06月 06日</span>
        </div>
        <div class="row">
          <b>Position</b>
          <span class="ink-field" aria-label="职位字段被墨水覆盖">
            <span class="ink-absorb"></span>
            <span class="ink-bleed"></span>
            <span class="ink-body"></span>
            <span class="ink-drop d1"></span>
            <span class="ink-drop d2"></span>
            <span class="ink-drop d3"></span>
            <span class="ink-drop d4"></span>
          </span>
        </div>
      </div>

      <div class="barcode" aria-hidden="true">
        <i style="--w:5px"></i><i style="--w:2px"></i><i style="--w:9px"></i><i style="--w:3px"></i>
        <i style="--w:6px"></i><i style="--w:2px"></i><i style="--w:12px"></i><i style="--w:4px"></i>
        <i style="--w:2px"></i><i style="--w:8px"></i><i style="--w:3px"></i><i style="--w:11px"></i>
        <i style="--w:2px"></i><i style="--w:7px"></i><i style="--w:4px"></i><i style="--w:9px"></i>
        <i style="--w:2px"></i><i style="--w:6px"></i><i style="--w:3px"></i><i style="--w:10px"></i>
      </div>
    </div>

    <!-- ===== BACK ===== -->
    <div class="badge-back">
      <div class="back-title">Recovered Staff Credential</div>
      <p class="back-note">该工牌来自南洄科技有限公司临时外包人员记录。职位字段被墨水覆盖，入职日期与夜行定向赛异常批次相同。</p>
      <p class="back-note">如果你在系统里看到同一个编号，不要只查人名。</p>
      <div class="back-stamp">VOID</div>
    </div>

    <div class="shadow" aria-hidden="true"></div>
  </section>
</main>

<script>
(() => {
  const badge = document.getElementById("badge");
  const shadow = badge.querySelector(".shadow");

  // Particles
  const particlesEl = document.getElementById("particles");
  for (let i = 0; i < 20; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "%";
    p.style.animationDuration = (7 + Math.random() * 10) + "s";
    p.style.animationDelay = (Math.random() * 8) + "s";
    const s = (1.5 + Math.random() * 2) + "px";
    p.style.width = s;
    p.style.height = s;
    particlesEl.appendChild(p);
  }

  // ===== 360° Drag =====
  let rotX = 10;
  let rotY = -18;
  let flipped = false;
  let dragging = false;
  let lastX = 0;
  let lastY = 0;
  let velX = 0;
  let velY = 0;

  function render() {
    const flip = flipped ? 180 : 0;
    badge.style.transform = `rotateX(${rotX}deg) rotateY(${rotY + flip}deg)`;

    const pitchEffect = Math.cos(rotX * Math.PI / 180);
    const s = Math.max(0.3, Math.abs(pitchEffect));
    if (shadow) {
      shadow.style.opacity = 0.15 * s + 0.05;
      shadow.style.transform = `translateZ(-90px) rotateX(82deg) scaleX(${s})`;
    }
  }

  badge.addEventListener("pointerdown", (e) => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    velX = 0;
    velY = 0;
    badge.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  badge.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    rotY += dx * 0.4;
    rotX -= dy * 0.4;
    velY = dx * 0.4;
    velX = -dy * 0.4;
    lastX = e.clientX;
    lastY = e.clientY;
    render();
  });

  badge.addEventListener("pointerup",     () => { dragging = false; });
  badge.addEventListener("pointercancel", () => { dragging = false; });

  badge.addEventListener("dblclick", () => {
    flipped = !flipped;
    render();
  });

  // ===== Inertia + Idle =====
  const DECAY = 0.955;
  let idlePhase = 0;

  function animate() {
    if (!dragging) {
      rotX += velX;
      rotY += velY;
      velX *= DECAY;
      velY *= DECAY;
      if (Math.abs(velX) < 0.01) velX = 0;
      if (Math.abs(velY) < 0.01) velY = 0;

      if (velX === 0 && velY === 0) {
        idlePhase += 0.008;
        rotY += Math.sin(idlePhase * 0.7) * 0.12;
        rotX += Math.cos(idlePhase) * 0.06;
      }
      render();
    }
    requestAnimationFrame(animate);
  }

  render();
  animate();
})();
</script>
</body>
</html>
