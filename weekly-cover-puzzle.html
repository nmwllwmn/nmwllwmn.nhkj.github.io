<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案封面预览 - 南洄工作台</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f5f6f8;
            --surface: #fff;
            --line: #e5e6eb;
            --soft-line: #f0f1f4;
            --text: #1d2129;
            --muted: #4e5969;
            --subtle: #86909c;
            --accent: #2f75ff;
            --purple: #7357d8;
            --green: #34c759;
            --orange: #ff9f0a;
            --shadow: 0 18px 46px rgba(15, 23, 42, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            display: grid;
            grid-template-rows: 56px 1fr 28px;
        }
        button { font: inherit; }
        .topbar {
            height: 56px;
            padding: 0 20px;
            border-bottom: 1px solid var(--line);
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .mark {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--purple), var(--accent));
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 750;
        }
        .title strong { display: block; font-size: 15px; }
        .title span { color: var(--subtle); font-size: 12px; }
        .toolbar {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn {
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12.5px;
        }
        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn svg { width: 15px; height: 15px; }
        .workspace {
            min-height: 0;
            padding: 18px;
            display: grid;
            grid-template-columns: minmax(320px, 1fr) 320px;
            gap: 16px;
            overflow: hidden;
        }
        .stage,
        .side {
            min-height: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
            overflow: hidden;
        }
        .stage-head,
        .side-head {
            min-height: 48px;
            padding: 0 14px;
            border-bottom: 1px solid var(--soft-line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .stage-head h1,
        .side-head h2 {
            font-size: 14px;
        }
        .muted { color: var(--subtle); font-size: 12px; }
        .puzzle-wrap {
            height: calc(100% - 48px);
            min-height: 0;
            padding: 18px;
            display: grid;
            place-items: center;
            overflow: auto;
            background:
                linear-gradient(90deg, rgba(47,117,255,0.04) 1px, transparent 1px),
                linear-gradient(0deg, rgba(47,117,255,0.04) 1px, transparent 1px),
                #fbfcff;
            background-size: 28px 28px;
        }
        .board-shell {
            width: min(78vh, 720px, 100%);
            display: grid;
            gap: 12px;
        }
        .board {
            width: 100%;
            aspect-ratio: 1;
            display: grid;
            gap: 2px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #dfe6f5;
            box-shadow: var(--shadow);
        }
        .tile {
            border: 0;
            border-radius: 4px;
            background-repeat: no-repeat;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.28), 0 1px 2px rgba(15,23,42,0.12);
            transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
        }
        .tile:hover {
            transform: translateY(-1px);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35), 0 5px 12px rgba(15,23,42,0.16);
        }
        .tile.empty {
            opacity: 0;
            cursor: default;
            box-shadow: none;
        }
        .board-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: var(--subtle);
            font-size: 12px;
        }
        .level-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 14px;
        }
        .level-card {
            min-height: 74px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 10px;
            display: grid;
            gap: 5px;
        }
        .level-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(47,117,255,0.12);
        }
        .level-card.done {
            border-color: #b7ebc6;
            background: #f6fffa;
        }
        .level-card strong { font-size: 13px; }
        .note {
            margin: 0 14px 14px;
            padding: 12px;
            border: 1px solid var(--soft-line);
            border-radius: 8px;
            background: #fbfcff;
            color: var(--muted);
            font-size: 12.5px;
            line-height: 1.75;
        }
        .cover-preview {
            margin: 0 14px 14px;
            border: 1px solid var(--soft-line);
            border-radius: 8px;
            background: #f8fafc;
            overflow: hidden;
        }
        .cover-preview img {
            width: 100%;
            display: block;
        }
        .result {
            display: none;
            margin: 0 14px 14px;
            padding: 14px;
            border: 1px solid #b7ebc6;
            border-radius: 8px;
            background: #f6fffa;
            color: #237b3b;
            font-size: 12.5px;
            line-height: 1.75;
        }
        .result.is-open { display: block; }
        .footbar {
            height: 28px;
            padding: 0 12px;
            border-top: 1px solid var(--line);
            background: var(--surface);
            color: var(--subtle);
            font-size: 11.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 920px) {
            body { grid-template-rows: auto 1fr 28px; }
            .topbar { min-height: 56px; height: auto; flex-wrap: wrap; padding: 10px 12px; }
            .toolbar { margin-left: 0; }
            .workspace {
                grid-template-columns: 1fr;
                overflow: auto;
                padding: 12px;
            }
            .stage { min-height: 520px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="mark">洄</div>
        <div class="title">
            <strong>方案封面预览</strong>
            <span>南洄科技有限公司 / 文档中心 / 普通工作台视图</span>
        </div>
        <div class="toolbar">
            <button class="btn" type="button" id="shuffleBtn"><i data-lucide="shuffle"></i>重新打散</button>
            <button class="btn primary" type="button" id="nextBtn"><i data-lucide="arrow-right"></i>下一关</button>
        </div>
    </header>

    <main class="workspace">
        <section class="stage">
            <div class="stage-head">
                <h1 id="levelTitle">第一关 / 4 x 4</h1>
                <span class="muted" id="levelMeta">移动 0 次 / 00:00</span>
            </div>
            <div class="puzzle-wrap">
                <div class="board-shell">
                    <div class="board" id="board" aria-label="方案封面拼图"></div>
                    <div class="board-meta">
                        <span>点击空格旁边的碎片移动。</span>
                        <span id="statusText">封面切片待校准</span>
                    </div>
                </div>
            </div>
        </section>

        <aside class="side">
            <div class="side-head">
                <h2>归档封面校准</h2>
                <span class="muted">v3.2</span>
            </div>
            <div class="level-row" id="levelCards"></div>
            <div class="note">
                文档中心偶尔会把方案封面切片打乱。完成三次校准后，系统会生成一张可归档的封面预览。这个入口不影响正式复核流程。
            </div>
            <div class="cover-preview">
                <img id="previewImg" alt="方案封面预览">
            </div>
            <div class="result" id="resultBox">
                <strong>封面已生成。</strong><br>
                已同步到归档草稿。AI小洄新增摘录：“封面比正文更整齐。”
            </div>
        </aside>
    </main>

    <footer class="footbar">
        <span>南洄科技有限公司</span>
        <span>/</span>
        <span>方案封面预览</span>
        <span style="margin-left:auto;">Surface Easter Egg / 不写入主线证据</span>
    </footer>

    <script>
        const levels = [
            { size: 4, title: '第一关 / 4 x 4', label: '基础封面' },
            { size: 6, title: '第二关 / 6 x 6', label: '归档封面' },
            { size: 8, title: '第三关 / 8 x 8', label: '终版封面' }
        ];
        let levelIndex = 0;
        let tiles = [];
        let moves = 0;
        let startedAt = Date.now();
        let timer = null;
        const completed = new Set();

        const board = document.getElementById('board');
        const levelTitle = document.getElementById('levelTitle');
        const levelMeta = document.getElementById('levelMeta');
        const statusText = document.getElementById('statusText');
        const levelCards = document.getElementById('levelCards');
        const previewImg = document.getElementById('previewImg');
        const resultBox = document.getElementById('resultBox');

        function coverSvg() {
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
                    <defs>
                        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#f8fbff"/>
                            <stop offset="0.55" stop-color="#ffffff"/>
                            <stop offset="1" stop-color="#eef3ff"/>
                        </linearGradient>
                        <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0" stop-color="#7357d8"/>
                            <stop offset="1" stop-color="#2f75ff"/>
                        </linearGradient>
                    </defs>
                    <rect width="900" height="900" fill="url(#bg)"/>
                    <rect x="72" y="72" width="756" height="756" fill="#fff" stroke="#d8dfef" stroke-width="3"/>
                    <rect x="72" y="72" width="756" height="112" fill="url(#bar)"/>
                    <text x="116" y="142" font-size="38" font-family="Microsoft YaHei, sans-serif" fill="#fff" font-weight="700">南洄科技有限公司</text>
                    <text x="116" y="286" font-size="62" font-family="Microsoft YaHei, sans-serif" fill="#1d2129" font-weight="800">方案封面</text>
                    <text x="120" y="342" font-size="24" font-family="Microsoft YaHei, sans-serif" fill="#4e5969">方案设计组 / 普通工作台视图</text>
                    <rect x="116" y="398" width="668" height="2" fill="#e5e6eb"/>
                    <text x="120" y="466" font-size="28" font-family="Microsoft YaHei, sans-serif" fill="#1d2129">文件名：方案交付清单_六月.xlsx</text>
                    <text x="120" y="526" font-size="28" font-family="Microsoft YaHei, sans-serif" fill="#1d2129">责任人：顾路 / GL-0606</text>
                    <text x="120" y="586" font-size="28" font-family="Microsoft YaHei, sans-serif" fill="#1d2129">版本号：v3.2 / 归档草稿</text>
                    <text x="120" y="646" font-size="28" font-family="Microsoft YaHei, sans-serif" fill="#1d2129">日期：06-05</text>
                    <rect x="116" y="704" width="668" height="72" rx="12" fill="#f5f7fb" stroke="#e5e6eb"/>
                    <text x="140" y="750" font-size="24" font-family="Microsoft YaHei, sans-serif" fill="#4e5969">归档编号：SURFACE-PLAN-0605</text>
                    <text x="116" y="818" font-size="20" font-family="Microsoft YaHei, sans-serif" fill="#86909c">封面预览仅用于版式校准，不写入主线证据。</text>
                    <circle cx="775" cy="812" r="26" fill="#7357d8"/>
                    <text x="758" y="823" font-size="26" font-family="Microsoft YaHei, sans-serif" fill="#fff" font-weight="700">洄</text>
                </svg>`;
            return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
        }

        const imageUrl = coverSvg();
        previewImg.src = imageUrl;

        function solvedTiles(size) {
            return Array.from({ length: size * size }, (_, index) => index === size * size - 1 ? -1 : index);
        }

        function shuffleByMoves(size) {
            const next = solvedTiles(size);
            let empty = next.indexOf(-1);
            let previous = -1;
            const steps = size * size * 18;
            for (let i = 0; i < steps; i++) {
                const neighbors = neighborIndexes(empty, size).filter((item) => item !== previous);
                const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
                previous = empty;
                next[empty] = next[pick];
                next[pick] = -1;
                empty = pick;
            }
            return next;
        }

        function neighborIndexes(index, size) {
            const row = Math.floor(index / size);
            const col = index % size;
            const out = [];
            if (row > 0) out.push(index - size);
            if (row < size - 1) out.push(index + size);
            if (col > 0) out.push(index - 1);
            if (col < size - 1) out.push(index + 1);
            return out;
        }

        function renderLevelCards() {
            levelCards.innerHTML = levels.map((level, index) => `
                <div class="level-card ${index === levelIndex ? 'active' : ''} ${completed.has(index) ? 'done' : ''}">
                    <strong>${level.label}</strong>
                    <span class="muted">${level.size} x ${level.size}</span>
                    <span class="muted">${completed.has(index) ? '已校准' : index === levelIndex ? '校准中' : '待解锁'}</span>
                </div>
            `).join('');
        }

        function renderBoard() {
            const level = levels[levelIndex];
            const size = level.size;
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            board.innerHTML = '';
            tiles.forEach((tileIndex, position) => {
                const tile = document.createElement('button');
                tile.type = 'button';
                tile.className = `tile${tileIndex === -1 ? ' empty' : ''}`;
                tile.setAttribute('aria-label', tileIndex === -1 ? '空位' : `切片 ${tileIndex + 1}`);
                if (tileIndex !== -1) {
                    const row = Math.floor(tileIndex / size);
                    const col = tileIndex % size;
                    tile.style.backgroundImage = `url("${imageUrl}")`;
                    tile.style.backgroundSize = `${size * 100}% ${size * 100}%`;
                    tile.style.backgroundPosition = `${(col / (size - 1)) * 100}% ${(row / (size - 1)) * 100}%`;
                    tile.addEventListener('click', () => moveTile(position));
                }
                board.appendChild(tile);
            });
            updateMeta();
        }

        function updateMeta() {
            const seconds = Math.floor((Date.now() - startedAt) / 1000);
            const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
            const ss = String(seconds % 60).padStart(2, '0');
            levelTitle.textContent = levels[levelIndex].title;
            levelMeta.textContent = `移动 ${moves} 次 / ${mm}:${ss}`;
        }

        function moveTile(position) {
            const size = levels[levelIndex].size;
            const empty = tiles.indexOf(-1);
            if (!neighborIndexes(empty, size).includes(position)) return;
            tiles[empty] = tiles[position];
            tiles[position] = -1;
            moves += 1;
            renderBoard();
            if (isSolved()) completeLevel();
        }

        function isSolved() {
            const size = levels[levelIndex].size;
            const solved = solvedTiles(size);
            return tiles.every((value, index) => value === solved[index]);
        }

        function completeLevel() {
            completed.add(levelIndex);
            renderLevelCards();
            if (levelIndex === levels.length - 1) {
                statusText.textContent = '三层封面校准完成';
                resultBox.classList.add('is-open');
                localStorage.setItem('nh_surface_cover_puzzle_done', 'true');
                const notes = localStorage.getItem('nh_xiaohui_notes') || '';
                if (!notes.includes('封面比正文更整齐')) {
                    localStorage.setItem('nh_xiaohui_notes', `${notes.trim()}\n- 方案封面预览：封面比正文更整齐。\n`.trim());
                }
                return;
            }
            statusText.textContent = `${levels[levelIndex].label}已校准`;
            window.setTimeout(() => {
                levelIndex += 1;
                startLevel(levelIndex);
            }, 700);
        }

        function startLevel(index = levelIndex) {
            levelIndex = index;
            moves = 0;
            startedAt = Date.now();
            resultBox.classList.remove('is-open');
            tiles = shuffleByMoves(levels[levelIndex].size);
            statusText.textContent = '封面切片待校准';
            renderLevelCards();
            renderBoard();
            window.clearInterval(timer);
            timer = window.setInterval(updateMeta, 1000);
        }

        document.getElementById('shuffleBtn').addEventListener('click', () => startLevel(levelIndex));
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (!completed.has(levelIndex)) return;
            if (levelIndex < levels.length - 1) startLevel(levelIndex + 1);
        });

        startLevel(0);
        lucide.createIcons();
    </script>
</body>
</html>
