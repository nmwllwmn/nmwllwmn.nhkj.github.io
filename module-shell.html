<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南洄工作台</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f5f6f8;
            --sidebar: #1d2030;
            --surface: #fff;
            --line: #e5e6eb;
            --soft-line: #f0f1f4;
            --text: #1d2129;
            --muted: #4e5969;
            --subtle: #86909c;
            --accent: #2f75ff;
            --accent-soft: #eaf1ff;
            --purple: #7357d8;
            --green: #34c759;
            --orange: #ff9f0a;
            --red: #ff4d2e;
            --shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
        }
        a { color: inherit; text-decoration: none; }
        button, input, textarea { font: inherit; }

        .sidebar {
            width: 204px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .brand {
            height: 56px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            color: #fff;
            font-weight: 650;
        }
        .mark {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--purple), var(--accent));
            display: grid;
            place-items: center;
            font-size: 17px;
        }
        .nav {
            flex: 1;
            overflow: auto;
            padding: 8px;
        }
        .nav::-webkit-scrollbar { width: 0; }
        .nav-label {
            padding: 14px 10px 6px;
            color: rgba(255,255,255,0.34);
            font-size: 11px;
            font-weight: 650;
        }
        .nav-item {
            height: 38px;
            margin-bottom: 1px;
            padding: 0 10px;
            border-radius: 6px;
            color: rgba(255,255,255,0.62);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .nav-item:hover { background: #282c42; color: rgba(255,255,255,0.9); }
        .nav-item.active { background: var(--accent); color: #fff; font-weight: 650; }
        .nav-item svg { width: 18px; height: 18px; stroke-width: 1.9; }
        .user {
            padding: 12px 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--accent));
            display: grid;
            place-items: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .user strong { display: block; font-size: 12.5px; }
        .user span { color: var(--green); font-size: 11px; }

        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            height: 52px;
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .title {
            min-width: 180px;
            display: flex;
            align-items: center;
            gap: 9px;
            font-weight: 650;
            font-size: 15px;
        }
        .title-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            display: grid;
            place-items: center;
        }
        .title-icon svg { width: 17px; height: 17px; }
        .tabs { display: flex; height: 100%; }
        .tab {
            height: 100%;
            padding: 0 14px;
            display: flex;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 650; }
        .search {
            margin-left: auto;
            width: 260px;
            position: relative;
        }
        .search input {
            width: 100%;
            height: 32px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--bg);
            outline: 0;
            padding: 0 12px 0 32px;
            font-size: 12.5px;
        }
        .search svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            color: var(--subtle);
        }
        .icon-btn {
            width: 32px;
            height: 32px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--subtle);
            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .icon-btn:hover { background: var(--bg); color: var(--text); }
        .icon-btn svg { width: 18px; height: 18px; }
        .content {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .split {
            height: 100%;
            display: grid;
            grid-template-columns: var(--left, 320px) 1fr var(--right, 0px);
            min-width: 0;
        }
        .pane {
            min-width: 0;
            min-height: 0;
            overflow: auto;
            background: var(--surface);
            border-right: 1px solid var(--line);
        }
        .pane:last-child { border-right: 0; }
        .pane.pad { padding: 20px; }
        .section-head {
            min-height: 56px;
            padding: 0 20px;
            border-bottom: 1px solid var(--soft-line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .section-head h2 { font-size: 16px; font-weight: 650; }
        .muted { color: var(--subtle); font-size: 12px; }
        .btn {
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12.5px;
        }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn svg { width: 15px; height: 15px; }
        .list { padding: 8px; }
        .list-row {
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .list-row:hover, .list-row.active { background: var(--bg); }
        .row-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 700;
            flex-shrink: 0;
        }
        .row-main { flex: 1; min-width: 0; }
        .row-main strong {
            display: block;
            font-size: 13px;
            font-weight: 650;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-main span {
            display: block;
            margin-top: 3px;
            color: var(--subtle);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-meta { color: var(--subtle); font-size: 12px; flex-shrink: 0; }
        .tag {
            padding: 2px 7px;
            border-radius: 5px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .table th, .table td {
            height: 44px;
            padding: 0 14px;
            border-bottom: 1px solid var(--soft-line);
            text-align: left;
        }
        .table th {
            color: var(--subtle);
            font-size: 12px;
            font-weight: 650;
            background: #fafbfc;
        }
        .status {
            padding: 3px 8px;
            border-radius: 5px;
            background: #edf8f0;
            color: #1f9d4b;
            font-size: 11px;
            font-weight: 650;
        }
        .status.wait { background: #fff5e0; color: #ad6800; }
        .status.gray { background: #f2f3f5; color: var(--subtle); }
        .chat-view {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #f7f8fa;
        }
        .chat-body {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }
        .msg {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .msg.self { flex-direction: row-reverse; }
        .bubble {
            max-width: min(620px, 70%);
            padding: 10px 13px;
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            font-size: 13px;
            line-height: 1.65;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .msg.self .bubble { background: #dff4d6; }
        .chat-input {
            min-height: 132px;
            background: #fff;
            border-top: 1px solid var(--line);
            padding: 12px 18px;
        }
        .tools { display: flex; gap: 12px; margin-bottom: 10px; color: var(--subtle); }
        .tools svg { width: 18px; height: 18px; }
        textarea {
            width: 100%;
            height: 52px;
            resize: none;
            border: 0;
            outline: 0;
            font-size: 13px;
            color: var(--text);
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 12px;
        }
        .card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 14px;
        }
        .card h3 { font-size: 14px; margin-bottom: 8px; }
        .card p { color: var(--subtle); font-size: 12px; line-height: 1.7; }
        .file-type {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 800;
            font-size: 12px;
        }
        .word { background: #2f75ff; }
        .excel { background: #16a34a; }
        .ppt { background: #f97316; }
        .pdf { background: #ef4444; }
        .calendar-grid {
            display: grid;
            grid-template-columns: 76px repeat(7, minmax(96px, 1fr));
            min-width: 820px;
            border-top: 1px solid var(--line);
            border-left: 1px solid var(--line);
        }
        .cal-cell {
            min-height: 58px;
            border-right: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            padding: 8px;
            background: #fff;
            font-size: 12px;
            color: var(--muted);
        }
        .cal-head { background: #fafbfc; color: var(--subtle); text-align: center; font-weight: 650; }
        .event {
            margin-top: 4px;
            padding: 6px;
            border-radius: 6px;
            background: var(--accent-soft);
            color: var(--accent);
            line-height: 1.35;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
            gap: 12px;
        }
        .app-tile {
            min-height: 116px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
        }
        .app-tile:hover { border-color: var(--accent); box-shadow: var(--shadow); }
        .app-tile .title-icon { width: 40px; height: 40px; }
        .app-tile strong { font-size: 13px; }
        .note-workspace {
            height: 100%;
            display: grid;
            grid-template-columns: 276px minmax(0, 1fr) 300px;
            background: var(--bg);
        }
        .note-editor {
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .note-title-input {
            width: 100%;
            border: 0;
            outline: 0;
            color: var(--text);
            font-size: 22px;
            font-weight: 750;
            padding: 22px 24px 8px;
        }
        .note-meta {
            padding: 0 24px 18px;
            color: var(--subtle);
            font-size: 12px;
            border-bottom: 1px solid var(--soft-line);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .note-body {
            flex: 1;
            min-height: 0;
            padding: 24px;
            overflow: auto;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.9;
        }
        .note-body h3 {
            margin: 18px 0 8px;
            color: var(--text);
            font-size: 15px;
        }
        .note-body ul {
            padding-left: 20px;
            display: grid;
            gap: 6px;
        }
        .note-body mark {
            padding: 1px 4px;
            border-radius: 4px;
            background: #fff7d6;
            color: #7c5b00;
        }
        .xiaohui-panel {
            background: #fbfcff;
            border-left: 1px solid var(--line);
            display: flex;
            flex-direction: column;
        }
        .xiaohui-card {
            margin: 12px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }
        .xiaohui-card h3 {
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .xiaohui-card p {
            color: var(--subtle);
            font-size: 12px;
            line-height: 1.75;
        }
        .quote-list {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }
        .quote {
            padding: 9px 10px;
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            background: var(--accent-soft);
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }
        .note-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .note-chip {
            padding: 4px 8px;
            border-radius: 999px;
            background: #f2f3f5;
            color: var(--muted);
            font-size: 11px;
        }
        .footbar {
            height: 28px;
            padding: 0 12px;
            border-top: 1px solid var(--line);
            background: var(--surface);
            color: var(--subtle);
            font-size: 11.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .xiaohui-float {
            position: fixed;
            right: 16px;
            bottom: 42px;
            z-index: 40;
            width: 340px;
            border: 1px solid rgba(229, 230, 235, 0.96);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 18px 46px rgba(15, 23, 42, 0.16);
            backdrop-filter: blur(16px);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }
        .xiaohui-float.is-collapsed {
            transform: translateX(362px);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
        }
        .xiaohui-tab {
            position: absolute;
            left: -46px;
            top: 14px;
            width: 42px;
            min-height: 122px;
            border: 0;
            border-radius: 8px 0 0 8px;
            background: linear-gradient(180deg, #5d56d6, #2f75ff);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(47, 117, 255, 0.22);
        }
        .xiaohui-tab svg {
            width: 18px;
            height: 18px;
        }
        .xiaohui-tab span {
            writing-mode: vertical-rl;
            letter-spacing: 1px;
            font-size: 12px;
            font-weight: 650;
        }
        .xiaohui-head {
            height: 48px;
            padding: 0 12px 0 14px;
            border-bottom: 1px solid var(--soft-line);
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .xiaohui-head strong {
            font-size: 13.5px;
        }
        .xiaohui-head span {
            margin-left: auto;
            color: var(--subtle);
            font-size: 11.5px;
        }
        .xiaohui-body {
            padding: 12px;
        }
        .xiaohui-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .xiaohui-chip {
            border: 0;
            border-radius: 999px;
            background: var(--bg);
            color: var(--muted);
            padding: 5px 9px;
            font-size: 11.5px;
            cursor: pointer;
        }
        .xiaohui-chip:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .xiaohui-textarea {
            width: 100%;
            min-height: 150px;
            max-height: 240px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: 8px;
            outline: 0;
            padding: 10px 11px;
            color: var(--text);
            background: #fbfcff;
            font: inherit;
            font-size: 12.5px;
            line-height: 1.7;
        }
        .xiaohui-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(47, 117, 255, 0.13);
            background: #fff;
        }
        .xiaohui-foot {
            margin-top: 9px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--subtle);
            font-size: 11.5px;
        }
        .xiaohui-foot .save-state {
            margin-left: auto;
        }
        .xiaohui-open {
            color: var(--accent);
            font-size: 11.5px;
        }

        @media (max-width: 900px) {
            .sidebar { width: 64px; }
            .brand span, .nav-label, .nav-item span, .user div { display: none; }
            .split { grid-template-columns: 1fr; }
            .pane:not(.primary) { display: none; }
            .search { display: none; }
            .xiaohui-float {
                right: 10px;
                bottom: 46px;
                width: min(330px, calc(100vw - 60px));
            }
            .xiaohui-float.is-collapsed {
                transform: translateX(calc(100% + 10px));
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <a class="brand" href="workbench.html" target="_blank" rel="noopener noreferrer">
            <div class="mark">洄</div><span>南洄工作台</span>
        </a>
        <nav class="nav" id="nav"></nav>
        <div class="user">
            <div class="avatar">顾</div>
            <div><strong>顾路</strong><span>在线</span></div>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="title">
                <div class="title-icon"><i id="pageIcon" data-lucide="layout-grid"></i></div>
                <span id="pageTitle">工作台应用</span>
            </div>
            <div class="tabs" id="tabs"></div>
            <div class="search"><i data-lucide="search"></i><input id="searchInput" placeholder="搜索"></div>
            <button class="icon-btn" title="刷新"><i data-lucide="refresh-cw"></i></button>
            <button class="icon-btn" title="更多"><i data-lucide="more-horizontal"></i></button>
        </header>
        <section class="content" id="app"></section>
        <footer class="footbar">
            <span>南洄科技有限公司</span>
            <span>/</span>
            <span id="statusText">同步正常</span>
            <span style="margin-left:auto;">GL-0606 / 普通工作台视图</span>
        </footer>
    </main>

    <aside class="xiaohui-float is-collapsed" id="xiaohuiFloat" aria-label="AI小洄悬浮记事本">
        <button class="xiaohui-tab" id="xiaohuiToggle" type="button" aria-label="展开 AI小洄">
            <i data-lucide="notebook-pen"></i>
            <span>AI小洄</span>
        </button>
        <div class="xiaohui-head">
            <i data-lucide="sparkles"></i>
            <strong>AI小洄记事本</strong>
            <span id="xiaohuiModeLabel">随手记录</span>
        </div>
        <div class="xiaohui-body">
            <div class="xiaohui-tools">
                <button class="xiaohui-chip" type="button" data-note-insert="【当前页】已回看当前应用分支，记录可继续核对。">摘当前页</button>
                <button class="xiaohui-chip" type="button" data-note-insert="【时间】需要对照消息、待办、访客、设备台账的更新时间。">时间线</button>
                <button class="xiaohui-chip" type="button" data-note-insert="【字段】同一词语在不同应用里出现，需确认来源。">字段对照</button>
                <button class="xiaohui-chip" type="button" data-note-insert="【待核对】此处暂不下结论，保留原始记录位置。">待核对</button>
            </div>
            <textarea class="xiaohui-textarea" id="xiaohuiNotes" placeholder="把复核过程、可疑字段、回看位置记在这里。AI小洄会自动保存。"></textarea>
            <div class="xiaohui-foot">
                <a class="xiaohui-open" href="module-shell.html?module=aiXiaohui" target="_blank" rel="noopener noreferrer">打开完整笔记</a>
                <span class="save-state" id="xiaohuiSaveState">已同步</span>
            </div>
        </div>
    </aside>

    <script>
        const APPS = [
            ['messages', '消息', 'message-circle'],
            ['documents', '文档', 'file-text'],
            ['aiTable', 'AI 表格', 'table-properties'],
            ['aiNote', 'AI 听记', 'mic-vocal'],
            ['aiXiaohui', 'AI小洄', 'notebook-pen'],
            ['contacts', '通讯录', 'users'],
            ['meeting', '会议', 'video'],
            ['calendar', '日历', 'calendar-days'],
            ['todo', '待办', 'square-check-big'],
            ['ding', 'DING', 'zap'],
            ['visitor', '访客记录', 'door-open'],

            app.innerHTML = `<section class="pane primary"><div class="section-head"><h2>设备归还</h2><button class="btn primary">${icon('scan-line')}扫码入库</button></div><table class="table"><thead><tr><th>资产编号</th><th>名称</th><th>持有人</th><th>归还状态</th><th>回执</th></tr></thead><tbody>
                ${[
                    ['NH-LT-2206', '办公笔记本', '顾路', '已归还', '已生成'],
                    ['NH-CARD-0606', '门禁工牌', '顾路', '待复核', '普通回执'],
                    ['NH-KEY-0412', '办公柜钥匙', '顾路', '已归还', '已生成']
                ].map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td><span class="status ${r[3] === '待复核' ? 'wait' : ''}">${r[3]}</span></td><td>${r[4]}</td></tr>`).join('')}
            </tbody></table></section>`;
        }

        function renderArchive() {
            setTabs(['归档', '审批', '流转记录']);
            document.getElementById('statusText').textContent = '归档与审批记录正常';
            app.innerHTML = `<section class="pane primary"><div class="section-head"><h2>归档与审批</h2><button class="btn">${icon('archive')}批量归档</button></div><table class="table"><thead><tr><th>单据</th><th>类型</th><th>发起人</th><th>流程</th><th>状态</th></tr></thead><tbody>
                ${[
                    ['AR-0605-118', '办公用品领用确认', '行政', '已流转', '已完成'],
                    ['AR-0605-119', '周报模板更新', '文档中心', '已发布', '已完成'],
                    ['AR-0606-060', '会议室预约确认', '日程', '已确认', '已完成'],
                    ['AR-0606-061', '设备回执归档', '资产管理', '普通流程', '已完成']
                ].map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td><span class="status">${r[4]}</span></td></tr>`).join('')}
            </tbody></table></section>`;
        }

        function renderAdd() {
            setTabs(['全部应用', '常用', '管理']);
            document.getElementById('statusText').textContent = '应用中心可用';
            app.innerHTML = `<section class="pane primary pad"><div class="app-grid">
                ${APPS.filter(([key]) => key !== 'add').map(([key, name, ic]) => `<a class="app-tile" href="${appUrl(key)}" target="_blank" rel="noopener noreferrer"><div class="title-icon">${icon(ic)}</div><strong>${name}</strong><span class="muted">已接入</span></a>`).join('')}
                <a class="app-tile" href="badge-drop-test.html" target="_blank" rel="noopener noreferrer"><div class="title-icon">${icon('badge-check')}</div><strong>工牌校验</strong><span class="muted">测试入口</span></a>
            </div></section>`;
        }

        const renderers = {
            messages: renderMessages,
            documents: renderDocuments,
            aiTable: renderTable,
            aiNote: renderNote,
            aiXiaohui: renderXiaohui,
            contacts: renderContacts,
            meeting: renderMeeting,
            calendar: renderCalendar,
            todo: renderTodo,
            ding: renderDing,
            visitor: renderVisitor,
            equipment: renderEquipment,
            archive: renderArchive,
            add: renderAdd
        };

        function initXiaohuiFloat() {
            const float = document.getElementById('xiaohuiFloat');
            const toggle = document.getElementById('xiaohuiToggle');
            const notes = document.getElementById('xiaohuiNotes');
            const saveState = document.getElementById('xiaohuiSaveState');
            const storageKey = 'nh_xiaohui_notes';
            const openKey = 'nh_xiaohui_open';

            notes.value = localStorage.getItem(storageKey) || '复核记录：\n- 首页表层状态正常，暂无红点。\n- 下一步回看文档、消息、访客记录的来源时间。\n';
            if (localStorage.getItem(openKey) === 'true') {
                float.classList.remove('is-collapsed');
            }

            toggle.addEventListener('click', (event) => {
                event.stopPropagation();
                float.classList.toggle('is-collapsed');
                localStorage.setItem(openKey, String(!float.classList.contains('is-collapsed')));
            });

            notes.addEventListener('input', () => {
                localStorage.setItem(storageKey, notes.value);
                saveState.textContent = '正在保存...';
                window.clearTimeout(notes._saveTimer);
                notes._saveTimer = window.setTimeout(() => {
                    saveState.textContent = '已同步';
                }, 360);
            });

            document.querySelectorAll('[data-note-insert]').forEach((button) => {
                button.addEventListener('click', () => {
                    const insert = button.getAttribute('data-note-insert');
                    notes.value = `${notes.value.trim()}\n- ${insert}\n`;
                    notes.dispatchEvent(new Event('input'));
                    notes.focus();
                });
            });
        }

        setShell();
        (renderers[moduleKey] || renderMessages)();
        initXiaohuiFloat();
        lucide.createIcons();
    </script>
</body>
</html>
