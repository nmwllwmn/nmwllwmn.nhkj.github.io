<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南洄工作台</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f5f6f8;
            --sidebar: #1d2030;
            --surface: #fff;
            --line: #e5e6eb;
            --soft-line: #f0f1f4;
            --text: #1d2129;
            --muted: #4e5969;
            --subtle: #86909c;
            --accent: #2f75ff;
            --accent-soft: #eaf1ff;
            --purple: #7357d8;
            --green: #34c759;
            --orange: #ff9f0a;
            --red: #ff4d2e;
            --shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
        }
        a { color: inherit; text-decoration: none; }
        button, input, textarea { font: inherit; }

        .sidebar {
            width: 204px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .brand {
            height: 56px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            color: #fff;
            font-weight: 650;
        }
        .mark {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--purple), var(--accent));
            display: grid;
            place-items: center;
            font-size: 17px;
        }
        .nav {
            flex: 1;
            overflow: auto;
            padding: 8px;
        }
        .nav::-webkit-scrollbar { width: 0; }
        .nav-label {
            padding: 14px 10px 6px;
            color: rgba(255,255,255,0.34);
            font-size: 11px;
            font-weight: 650;
        }
        .nav-item {
            height: 38px;
            margin-bottom: 1px;
            padding: 0 10px;
            border-radius: 6px;
            color: rgba(255,255,255,0.62);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .nav-item:hover { background: #282c42; color: rgba(255,255,255,0.9); }
        .nav-item.active { background: var(--accent); color: #fff; font-weight: 650; }
        .nav-item svg { width: 18px; height: 18px; stroke-width: 1.9; }
        .user {
            padding: 12px 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--accent));
            display: grid;
            place-items: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .user strong { display: block; font-size: 12.5px; }
        .user span { color: var(--green); font-size: 11px; }

        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            height: 52px;
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .title {
            min-width: 180px;
            display: flex;
            align-items: center;
            gap: 9px;
            font-weight: 650;
            font-size: 15px;
        }
        .title-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            display: grid;
            place-items: center;
        }
        .title-icon svg { width: 17px; height: 17px; }
        .tabs { display: flex; height: 100%; }
        .tab {
            height: 100%;
            padding: 0 14px;
            display: flex;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 650; }
        .search {
            margin-left: auto;
            width: 260px;
            position: relative;
        }
        .search input {
            width: 100%;
            height: 32px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--bg);
            outline: 0;
            padding: 0 12px 0 32px;
            font-size: 12.5px;
        }
        .search svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            color: var(--subtle);
        }
        .icon-btn {
            width: 32px;
            height: 32px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--subtle);
            display: grid;
            place-items: center;
            cursor: pointer;
        }
        .icon-btn:hover { background: var(--bg); color: var(--text); }
        .icon-btn svg { width: 18px; height: 18px; }
        .content {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .split {
            height: 100%;
            display: grid;
            grid-template-columns: var(--left, 320px) 1fr var(--right, 0px);
            min-width: 0;
        }
        .pane {
            min-width: 0;
            min-height: 0;
            overflow: auto;
            background: var(--surface);
            border-right: 1px solid var(--line);
        }
        .pane:last-child { border-right: 0; }
        .pane.pad { padding: 20px; }
        .section-head {
            min-height: 56px;
            padding: 0 20px;
            border-bottom: 1px solid var(--soft-line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .section-head h2 { font-size: 16px; font-weight: 650; }
        .muted { color: var(--subtle); font-size: 12px; }
        .btn {
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 12.5px;
        }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn svg { width: 15px; height: 15px; }
        .list { padding: 8px; }
        .list-row {
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .list-row:hover, .list-row.active { background: var(--bg); }
        .row-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 700;
            flex-shrink: 0;
        }
        .row-main { flex: 1; min-width: 0; }
        .row-main strong {
            display: block;
            font-size: 13px;
            font-weight: 650;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-main span {
            display: block;
            margin-top: 3px;
            color: var(--subtle);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .row-meta { color: var(--subtle); font-size: 12px; flex-shrink: 0; }
        .tag {
            padding: 2px 7px;
            border-radius: 5px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .table th, .table td {
            height: 44px;
            padding: 0 14px;
            border-bottom: 1px solid var(--soft-line);
            text-align: left;
        }
        .table th {
            color: var(--subtle);
            font-size: 12px;
            font-weight: 650;
            background: #fafbfc;
        }
        .status {
            padding: 3px 8px;
            border-radius: 5px;
            background: #edf8f0;
            color: #1f9d4b;
            font-size: 11px;
            font-weight: 650;
        }
        .status.wait { background: #fff5e0; color: #ad6800; }
        .status.gray { background: #f2f3f5; color: var(--subtle); }
        .chat-view {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #f7f8fa;
        }
        .chat-body {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }
        .msg {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .msg.self { flex-direction: row-reverse; }
        .bubble {
            max-width: min(620px, 70%);
            padding: 10px 13px;
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            font-size: 13px;
            line-height: 1.65;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .msg.self .bubble { background: #dff4d6; }
        .chat-input {
            min-height: 132px;
            background: #fff;
            border-top: 1px solid var(--line);
            padding: 12px 18px;
        }
        .tools { display: flex; gap: 12px; margin-bottom: 10px; color: var(--subtle); }
        .tools svg { width: 18px; height: 18px; }
        textarea {
            width: 100%;
            height: 52px;
            resize: none;
            border: 0;
            outline: 0;
            font-size: 13px;
            color: var(--text);
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 12px;
        }
        .card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 14px;
        }
        .card h3 { font-size: 14px; margin-bottom: 8px; }
        .card p { color: var(--subtle); font-size: 12px; line-height: 1.7; }
        .file-type {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 800;
            font-size: 12px;
        }
        .word { background: #2f75ff; }
        .excel { background: #16a34a; }
        .ppt { background: #f97316; }
        .pdf { background: #ef4444; }
        .calendar-grid {
            display: grid;
            grid-template-columns: 76px repeat(7, minmax(96px, 1fr));
            min-width: 820px;
            border-top: 1px solid var(--line);
            border-left: 1px solid var(--line);
        }
        .cal-cell {
            min-height: 58px;
            border-right: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
            padding: 8px;
            background: #fff;
            font-size: 12px;
            color: var(--muted);
        }
        .cal-head { background: #fafbfc; color: var(--subtle); text-align: center; font-weight: 650; }
        .event {
            margin-top: 4px;
            padding: 6px;
            border-radius: 6px;
            background: var(--accent-soft);
            color: var(--accent);
            line-height: 1.35;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
            gap: 12px;
        }
        .app-tile {
            min-height: 116px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
        }
        .app-tile:hover { border-color: var(--accent); box-shadow: var(--shadow); }
        .app-tile .title-icon { width: 40px; height: 40px; }
        .app-tile strong { font-size: 13px; }
        .note-workspace {
            height: 100%;
            display: grid;
            grid-template-columns: 276px minmax(0, 1fr) 300px;
            background: var(--bg);
        }
        .note-editor {
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .note-title-input {
            width: 100%;
            border: 0;
            outline: 0;
            color: var(--text);
            font-size: 22px;
            font-weight: 750;
            padding: 22px 24px 8px;
        }
        .note-meta {
            padding: 0 24px 18px;
            color: var(--subtle);
            font-size: 12px;
            border-bottom: 1px solid var(--soft-line);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .note-body {
            flex: 1;
            min-height: 0;
            padding: 24px;
            overflow: auto;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.9;
        }
        .note-body h3 {
            margin: 18px 0 8px;
            color: var(--text);
            font-size: 15px;
        }
        .note-body ul {
            padding-left: 20px;
            display: grid;
            gap: 6px;
        }
        .note-body mark {
            padding: 1px 4px;
            border-radius: 4px;
            background: #fff7d6;
            color: #7c5b00;
        }
        .xiaohui-panel {
            background: #fbfcff;
            border-left: 1px solid var(--line);
            display: flex;
            flex-direction: column;
        }
        .xiaohui-card {
            margin: 12px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }
        .xiaohui-card h3 {
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .xiaohui-card p {
            color: var(--subtle);
            font-size: 12px;
            line-height: 1.75;
        }
        .quote-list {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }
        .quote {
            padding: 9px 10px;
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            background: var(--accent-soft);
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }
        .note-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .note-chip {
            padding: 4px 8px;
            border-radius: 999px;
            background: #f2f3f5;
            color: var(--muted);
            font-size: 11px;
        }
        .detail-backdrop {
            position: fixed;
            inset: 0;
            z-index: 70;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 28px;
            background: rgba(15, 23, 42, 0.28);
            backdrop-filter: blur(6px);
        }
        .detail-backdrop.is-open { display: flex; }
        .detail-dialog {
            width: min(760px, 100%);
            max-height: min(760px, calc(100vh - 56px));
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 28px 70px rgba(15, 23, 42, 0.22);
            display: flex;
            flex-direction: column;
        }
        .detail-head {
            min-height: 58px;
            padding: 0 18px;
            border-bottom: 1px solid var(--soft-line);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .detail-head h2 {
            font-size: 16px;
            line-height: 1.4;
        }
        .detail-close {
            margin-left: auto;
            width: 32px;
            height: 32px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--subtle);
            cursor: pointer;
            display: grid;
            place-items: center;
        }
        .detail-close:hover { background: var(--bg); color: var(--text); }
        .detail-body {
            overflow: auto;
            padding: 18px;
            display: grid;
            gap: 14px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.75;
        }
        .detail-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        .detail-meta div {
            border: 1px solid var(--soft-line);
            border-radius: 8px;
            padding: 10px 12px;
            background: #fbfcff;
        }
        .detail-meta span {
            display: block;
            margin-bottom: 4px;
            color: var(--subtle);
            font-size: 11.5px;
        }
        .detail-meta strong { color: var(--text); }
        .detail-section {
            border: 1px solid var(--soft-line);
            border-radius: 8px;
            background: #fff;
            padding: 13px 14px;
        }
        .detail-section h3 {
            margin-bottom: 8px;
            color: var(--text);
            font-size: 13.5px;
        }
        .detail-section ul {
            padding-left: 18px;
            display: grid;
            gap: 5px;
        }
        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .clickable { cursor: pointer; }
        .clickable:hover { background: var(--bg); }
        .footbar {
            height: 28px;
            padding: 0 12px;
            border-top: 1px solid var(--line);
            background: var(--surface);
            color: var(--subtle);
            font-size: 11.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .xiaohui-float {
            position: fixed;
            right: 16px;
            bottom: 42px;
            z-index: 40;
            width: 340px;
            min-width: 260px;
            max-width: min(640px, calc(100vw - 80px));
            min-height: 230px;
            max-height: calc(100vh - 86px);
            border: 1px solid rgba(229, 230, 235, 0.96);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 18px 46px rgba(15, 23, 42, 0.16);
            backdrop-filter: blur(16px);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            resize: both;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .xiaohui-float.is-collapsed {
            width: 42px !important;
            min-width: 42px;
            height: 132px !important;
            min-height: 132px;
            resize: none;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
        }
        .xiaohui-tab {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 42px;
            border: 0;
            border-radius: 8px 0 0 8px;
            background: linear-gradient(180deg, #5d56d6, #2f75ff);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(47, 117, 255, 0.22);
        }
        .xiaohui-tab svg {
            width: 18px;
            height: 18px;
        }
        .xiaohui-tab span {
            writing-mode: vertical-rl;
            letter-spacing: 1px;
            font-size: 12px;
            font-weight: 650;
        }
        .xiaohui-head {
            height: 48px;
            margin-left: 42px;
            padding: 0 12px 0 14px;
            border-bottom: 1px solid var(--soft-line);
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: move;
            flex-shrink: 0;
        }
        .xiaohui-float.is-collapsed .xiaohui-head,
        .xiaohui-float.is-collapsed .xiaohui-body {
            display: none;
        }
        .xiaohui-head strong {
            font-size: 13.5px;
        }
        .xiaohui-head span {
            margin-left: auto;
            color: var(--subtle);
            font-size: 11.5px;
        }
        .xiaohui-body {
            margin-left: 42px;
            padding: 12px;
            display: flex;
            flex: 1;
            min-height: 0;
            flex-direction: column;
        }
        .xiaohui-textarea {
            width: 100%;
            flex: 1;
            min-height: 120px;
            resize: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            outline: 0;
            padding: 10px 11px;
            color: var(--text);
            background: #fbfcff;
            font: inherit;
            font-size: 12.5px;
            line-height: 1.7;
        }
        .xiaohui-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(47, 117, 255, 0.13);
            background: #fff;
        }
        .xiaohui-foot {
            margin-top: 9px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--subtle);
            font-size: 11.5px;
        }
        .xiaohui-foot .save-state {
            margin-left: auto;
        }
        .xiaohui-resize-handle {
            position: absolute;
            z-index: 2;
        }
        .xiaohui-float.is-collapsed .xiaohui-resize-handle {
            display: none;
        }
        .xiaohui-resize-handle.n {
            top: -3px;
            left: 48px;
            right: 6px;
            height: 8px;
            cursor: ns-resize;
        }
        .xiaohui-resize-handle.s {
            bottom: -3px;
            left: 48px;
            right: 6px;
            height: 8px;
            cursor: ns-resize;
        }
        .xiaohui-resize-handle.e {
            top: 6px;
            right: -3px;
            bottom: 6px;
            width: 8px;
            cursor: ew-resize;
        }
        .xiaohui-resize-handle.w {
            top: 6px;
            left: -3px;
            bottom: 6px;
            width: 8px;
            cursor: ew-resize;
        }
        .xiaohui-resize-handle.ne,
        .xiaohui-resize-handle.nw,
        .xiaohui-resize-handle.se,
        .xiaohui-resize-handle.sw {
            width: 14px;
            height: 14px;
        }
        .xiaohui-resize-handle.ne { top: -4px; right: -4px; cursor: nesw-resize; }
        .xiaohui-resize-handle.nw { top: -4px; left: -4px; cursor: nwse-resize; }
        .xiaohui-resize-handle.se { right: -4px; bottom: -4px; cursor: nwse-resize; }
        .xiaohui-resize-handle.sw { left: -4px; bottom: -4px; cursor: nesw-resize; }

        @media (max-width: 900px) {
            .sidebar { width: 64px; }
            .brand span, .nav-label, .nav-item span, .user div { display: none; }
            .split { grid-template-columns: 1fr; }
            .pane:not(.primary) { display: none; }

        function detailHtml(detail) {
            const meta = (detail.meta || []).map(([label, value]) => `<div><span>${label}</span><strong>${value}</strong></div>`).join('');
            const sections = (detail.sections || []).map(([title, lines]) => `<section class="detail-section"><h3>${title}</h3><ul>${lines.map(line => `<li>${line}</li>`).join('')}</ul></section>`).join('');
            return `${meta ? `<div class="detail-meta">${meta}</div>` : ''}${sections}<div class="detail-actions"><button class="btn primary" type="button" data-close-detail>${icon('check')}已阅</button><button class="btn" type="button" data-copy-detail="${detail.title}">${icon('copy')}记录到 AI小洄</button></div>`;
        }

        function openDetail(key) {
            const detail = DETAIL_DATA[key];
            if (!detail) return;
            document.getElementById('detailTitle').textContent = detail.title;
            document.getElementById('detailBody').innerHTML = detailHtml(detail);
            const backdrop = document.getElementById('detailBackdrop');
            backdrop.classList.add('is-open');
            backdrop.setAttribute('aria-hidden', 'false');
            lucide.createIcons();
        }

        function closeDetail() {
            const backdrop = document.getElementById('detailBackdrop');
            backdrop.classList.remove('is-open');
            backdrop.setAttribute('aria-hidden', 'true');
        }

        document.addEventListener('click', (event) => {
            const detailTrigger = event.target.closest('[data-detail]');
            if (detailTrigger) {
                event.preventDefault();
                openDetail(detailTrigger.getAttribute('data-detail'));
                return;
            }
            const copyTrigger = event.target.closest('[data-copy-detail]');
            if (copyTrigger) {
                const notes = document.getElementById('xiaohuiNotes');
                if (notes) {
                    const stamp = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                    notes.value = `${notes.value.trim()}\n- ${stamp} 已记录：${copyTrigger.getAttribute('data-copy-detail')}\n`;
                    notes.dispatchEvent(new Event('input'));
                }
                closeDetail();
                return;
            }
            if (event.target.closest('[data-close-detail]')) closeDetail();
        });

        document.getElementById('detailClose').addEventListener('click', closeDetail);
        document.getElementById('detailBackdrop').addEventListener('click', (event) => {
            if (event.target.id === 'detailBackdrop') closeDetail();
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeDetail();
        });

        function initXiaohuiFloat() {
            const float = document.getElementById('xiaohuiFloat');
            const toggle = document.getElementById('xiaohuiToggle');
            const notes = document.getElementById('xiaohuiNotes');
            const saveState = document.getElementById('xiaohuiSaveState');
            const storageKey = 'nh_xiaohui_notes';
            const openKey = 'nh_xiaohui_open';
            const rectKey = 'nh_xiaohui_rect';

            notes.value = localStorage.getItem(storageKey) || '复核记录：\n- 首页表层状态正常，暂无红点。\n- 下一步回看文档、消息、访客记录的来源时间。\n';
            const defaultRect = {
                left: Math.max(8, window.innerWidth - 356),
                top: Math.max(8, window.innerHeight - 42 - 230),
                width: 340,
                height: 230
            };
            const savedRect = JSON.parse(localStorage.getItem(rectKey) || 'null') || defaultRect;
            if (savedRect) {
                float.style.left = `${savedRect.left}px`;
                float.style.top = `${savedRect.top}px`;
                float.style.right = 'auto';
                float.style.bottom = 'auto';
                float.style.width = `${savedRect.width}px`;
                float.style.height = `${savedRect.height}px`;
            }
            const shouldOpen = localStorage.getItem(openKey) === 'true';
            float.classList.toggle('is-collapsed', !shouldOpen);

            function applyExpandedRect() {
                const rect = JSON.parse(localStorage.getItem(rectKey) || 'null') || savedRect || defaultRect;
                const width = Math.min(Math.max(rect.width, 260), Math.min(640, window.innerWidth - 80));
                const height = Math.min(Math.max(rect.height, 230), window.innerHeight - 86);
                const left = Math.min(window.innerWidth - width - 8, Math.max(8, rect.left));
                const top = Math.min(window.innerHeight - height - 8, Math.max(8, rect.top));
                float.style.left = `${left}px`;
                float.style.top = `${top}px`;
                float.style.right = 'auto';
                float.style.bottom = 'auto';
                float.style.width = `${width}px`;
                float.style.height = `${height}px`;
            }

            function applyCollapsedRect() {
                const rect = JSON.parse(localStorage.getItem(rectKey) || 'null') || savedRect || defaultRect;
                const left = Math.min(window.innerWidth - 42 - 8, Math.max(8, rect.left));
                const top = Math.min(window.innerHeight - 132 - 8, Math.max(8, rect.top));
                float.style.left = `${left}px`;
                float.style.top = `${top}px`;
                float.style.right = 'auto';
                float.style.bottom = 'auto';
            }

            if (shouldOpen) applyExpandedRect();
            else applyCollapsedRect();

            toggle.addEventListener('click', (event) => {
                event.stopPropagation();
                const willOpen = float.classList.contains('is-collapsed');
                if (willOpen) {
                    float.classList.remove('is-collapsed');
                    applyExpandedRect();
                } else {
                    saveFloatRect();
                    float.classList.add('is-collapsed');
                    applyCollapsedRect();
                }
                localStorage.setItem(openKey, String(willOpen));
            });

            function saveFloatRect() {
                const rect = float.getBoundingClientRect();
                localStorage.setItem(rectKey, JSON.stringify({
                    left: Math.max(6, Math.round(rect.left)),
                    top: Math.max(6, Math.round(rect.top)),
                    width: Math.round(rect.width),
                    height: Math.round(rect.height)
                }));
            }

            const resizeObserver = new ResizeObserver(() => {
                if (!float.classList.contains('is-collapsed')) saveFloatRect();
            });
            resizeObserver.observe(float);

            const head = float.querySelector('.xiaohui-head');
            head.addEventListener('pointerdown', (event) => {
                if (float.classList.contains('is-collapsed')) return;
                event.preventDefault();
                head.setPointerCapture(event.pointerId);
                const startRect = float.getBoundingClientRect();
                const startX = event.clientX;
                const startY = event.clientY;

                function onMove(moveEvent) {
                    const nextLeft = Math.min(window.innerWidth - startRect.width - 8, Math.max(8, startRect.left + moveEvent.clientX - startX));
                    const nextTop = Math.min(window.innerHeight - startRect.height - 8, Math.max(8, startRect.top + moveEvent.clientY - startY));
                    float.style.left = `${nextLeft}px`;
                    float.style.top = `${nextTop}px`;
                    float.style.right = 'auto';
                    float.style.bottom = 'auto';
                }

                function onUp() {
                    head.removeEventListener('pointermove', onMove);
                    head.removeEventListener('pointerup', onUp);
                    head.removeEventListener('pointercancel', onUp);
                    saveFloatRect();
                }

                head.addEventListener('pointermove', onMove);
                head.addEventListener('pointerup', onUp);
                head.addEventListener('pointercancel', onUp);
            });

            document.querySelectorAll('#xiaohuiFloat [data-resize]').forEach((handle) => {
                handle.addEventListener('pointerdown', (event) => {
                    if (float.classList.contains('is-collapsed')) return;
                    event.preventDefault();
                    event.stopPropagation();
                    handle.setPointerCapture(event.pointerId);
                    const dir = handle.getAttribute('data-resize');
                    const startRect = float.getBoundingClientRect();
                    const startX = event.clientX;
                    const startY = event.clientY;
                    const minW = 260;
                    const minH = 230;
                    const maxW = Math.min(640, window.innerWidth - 80);
                    const maxH = window.innerHeight - 86;

                    function onResize(moveEvent) {
                        let left = startRect.left;
                        let top = startRect.top;
                        let width = startRect.width;
                        let height = startRect.height;
                        const dx = moveEvent.clientX - startX;
                        const dy = moveEvent.clientY - startY;

                        if (dir.includes('e')) width = startRect.width + dx;
                        if (dir.includes('s')) height = startRect.height + dy;
                        if (dir.includes('w')) {
                            width = startRect.width - dx;
                            left = startRect.left + dx;
                        }
                        if (dir.includes('n')) {
                            height = startRect.height - dy;
                            top = startRect.top + dy;
                        }

                        width = Math.min(maxW, Math.max(minW, width));
                        height = Math.min(maxH, Math.max(minH, height));
                        left = Math.min(window.innerWidth - width - 8, Math.max(8, left));
                        top = Math.min(window.innerHeight - height - 8, Math.max(8, top));

                        float.style.left = `${left}px`;
                        float.style.top = `${top}px`;
                        float.style.right = 'auto';
                        float.style.bottom = 'auto';
                        float.style.width = `${width}px`;
                        float.style.height = `${height}px`;
                    }

                    function onResizeEnd() {
                        handle.removeEventListener('pointermove', onResize);
                        handle.removeEventListener('pointerup', onResizeEnd);
                        handle.removeEventListener('pointercancel', onResizeEnd);
                        saveFloatRect();
                    }

                    handle.addEventListener('pointermove', onResize);
                    handle.addEventListener('pointerup', onResizeEnd);
                    handle.addEventListener('pointercancel', onResizeEnd);
                });
            });

            notes.addEventListener('input', () => {
                localStorage.setItem(storageKey, notes.value);
                saveState.textContent = '正在保存...';
                window.clearTimeout(notes._saveTimer);
                notes._saveTimer = window.setTimeout(() => {
                    saveState.textContent = '已同步';
                }, 360);
            });

        }

        setShell();
        (renderers[moduleKey] || renderMessages)();
        initXiaohuiFloat();
        lucide.createIcons();
    </script>
